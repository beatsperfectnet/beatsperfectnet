scenario_matrix:
  candidate_id:
  product_id:
  flow_version: FLOW-007
  status:
  allowed_statuses:
    - PASS
    - SCENARIO_MATRIX_FAILED
  hard_rule: Scenario fixtures must be executable, deterministic, and machine-checkable before build.
  numeric_truth_table_required_when_product_is_spreadsheet_or_calculator: true
  scenario_without_expected_outputs_blocks_build: true
  scenario_fixtures_required_before_build: true
  scenario_fixtures:
    - scenario_id:
      buyer_segment:
      starting_context:
      input_tables:
        - table_name:
          rows:
      expected_outputs:
        - field:
          value:
      expected_next_action:
      expected_warning_or_confidence_state:
      formula_sources_required:
        - 
      pass_fail_rule:
      pass_fail_result:
      blocker_if_failed:
  executable_fixture_rules:
    - scenario_id_must_be_unique
    - expected_outputs_must_be_numeric_or_machine_checkable
    - scenario_without_expected_outputs_cannot_pass
    - scenario_inputs_must_come_from_locked_fixture_data
    - builder_must_not_invent_seed_data_or_hidden_rows
  c004_canonical_scenarios:
    - no sales history
    - less than 30 days of sales
    - 30+ days of sales
    - supplier change
    - lead time change
    - fulfillment mode change
    - stock count correction
    - purchase received
    - SKU out of stock
    - slow-moving overstocked SKU
  blockers:
    - 
