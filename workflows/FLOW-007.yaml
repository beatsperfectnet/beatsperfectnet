FLOW-007:
  purpose: market_derived_product_architecture_contract_flow_for_build_ready_digital_products
  active_revision: FLOW-007-001
  rule: no_product_generation_before_build_readiness
  hard_rule: Only candidates with build_readiness.status = BUILD_READY may enter product generation.
  required_inputs:
    - company.md
    - docs/FLOW-007.md
    - docs/FLOW-007-001.md
    - docs/COMPANY-MEMORY.md
    - governance/05_governance_rules.yaml
    - governance/product_lane_exclusions.yaml
    - governance/06_resource_allocation.yaml
    - governance/07_capacity_model.yaml
    - governance/08_product_generation_budget_007.yaml
    - governance/09_stage_dispatch_007.yaml
    - governance/10_flow_007_pilot_policy.yaml
    - governance/11_learning_loop.yaml
    - specs/SCHEMA-007.yaml
    - specs/MODEL-007.yaml
    - specs/BLS-007.yaml
    - governance/03_admission_rules.yaml
    - templates/ideas-run-template.yaml
    - templates/candidates-run-template.yaml
    - templates/product-architecture-contract-template.yaml
    - templates/failed-product-label-template.yaml
    - templates/company-memory-preflight-template.yaml
    - templates/findings-ledger-template.yaml
    - templates/failure-intake-template.yaml
    - templates/postmortem-template.yaml
    - templates/finding-template.yaml
    - templates/flow-patch-template.yaml
    - templates/regression-replay-template.yaml
    - templates/company-memory-entry-template.yaml
    - templates/learning-closure-template.yaml
    - templates/product-identity-reframe-template.yaml
    - templates/material-product-delta-template.yaml
    - templates/competitor-autopsy-template.yaml
    - templates/scenario-matrix-template.yaml
    - templates/workbook-product-blueprint-template.yaml
    - templates/build-readiness-review-template.yaml
    - templates/actual-artifact-inspection-template.yaml
    - templates/blind-buyer-walkthrough-template.yaml
    - templates/pre-mortem-failure-analysis-template.yaml
    - templates/launch-gate-template.yaml
    - brandbook/beatsperfect-brandbook.v1.yaml
    - templates/target-audience-exploration-template.yaml
    - templates/target-audience-lock-template.yaml
    - docs/LEARN-001.md
  run_telemetry:
    runtime_launcher_ref: runtime/model-stage-launcher.mjs
    model_usage_ledger_required: true
    stage_dispatch_log_required: true
    exact_model_match_required: true
    product_generation_cost_accountability_required: true
    first_three_pilots_require_aggressive_frontier_final_reviews: true
    pilot_frontier_model: gpt-5.5
    prohibited_pilot_models:
      - gpt-5.5-pro
      - gpt-5.4-pro
      - any pro model
    priority_processing_allowed: false
  canonical_failure_modes:
    - failure_mode_id: EVIDENCE_TO_PRODUCT_LOCK_FAILURE
      finding_class: governance
      summary: Product direction was treated as locked before market evidence had the chance to choose it.
      hard_block_stages:
        - 00_market_evidence
        - 06_product_identity_reframe
        - 07_product_architecture_contract
      close_at_or_before: 07_product_architecture_contract
    - failure_mode_id: BENCHMARK_ADEQUACY_FAILURE
      finding_class: build
      summary: Broken, shallow, inaccessible, or decision-mismatched benchmark evidence was treated as sufficient to lock architecture.
      hard_block_stages:
        - 04_purchased_competitor_inspection
        - 07_product_architecture_contract
      close_at_or_before: 07_product_architecture_contract
    - failure_mode_id: BUYER_CONTRACT_INCOMPLETENESS
      finding_class: build
      summary: The target buyer, repeated workflow, decision moments, exclusions, or next actions were not locked before build.
      hard_block_stages:
        - 07_product_architecture_contract
        - 10_build_readiness_review
      close_at_or_before: 10_build_readiness_review
    - failure_mode_id: DOMAIN_MODEL_MISFIT
      finding_class: build
      summary: The product model does not match the real-world system, states, transitions, or causal structure it claims to represent.
      hard_block_stages:
        - 07_product_architecture_contract
        - 10_build_readiness_review
        - 11_pre_build_architecture_premortem
      close_at_or_before: 11_pre_build_architecture_premortem
    - failure_mode_id: DECISION_CONTRACT_FAILURE
      finding_class: build
      summary: The product surfaces status or generic outputs without locking the buyer decisions, required inputs, and decision rules.
      hard_block_stages:
        - 07_product_architecture_contract
        - 10_build_readiness_review
        - 13_real_artifact_inspection
      close_at_or_before: 13_real_artifact_inspection
    - failure_mode_id: SCENARIO_MATRIX_FAILURE
      finding_class: build
      summary: The architecture was not proven against realistic mutations, exceptions, sparse-data cases, or workflow changes before build.
      hard_block_stages:
        - 08_scenario_matrix
        - 10_build_readiness_review
        - 13_real_artifact_inspection
      close_at_or_before: 13_real_artifact_inspection
    - failure_mode_id: BLUEPRINT_BUILDER_INPUT_INVENTION
      finding_class: build
      summary: The builder would have to invent structure, fixtures, helper behavior, or output locations because the contract is not machine-checkable enough.
      hard_block_stages:
        - 09_workbook_or_product_blueprint
        - 10_build_readiness_review
        - 12_product_build
      close_at_or_before: 12_product_build
    - failure_mode_id: PREMORTEM_REPEAT_PATH_FAILURE
      finding_class: build
      summary: Pre-build analysis still allows the same previously rejected behavior to ship under a new attempt.
      hard_block_stages:
        - 11_pre_build_architecture_premortem
        - 12_product_build
        - 17_founder_launch_gate
      close_at_or_before: 17_founder_launch_gate
    - failure_mode_id: GOVERNANCE_WRAPPER_WITHOUT_MATERIAL_PRODUCT_DELTA
      finding_class: governance
      summary: The run repackages the same rejected buyer-facing product with cleaner governance or wrapper records but without a real product-model change.
      hard_block_stages:
        - 10_build_readiness_review
        - 13_real_artifact_inspection
        - 17_founder_launch_gate
      close_at_or_before: 17_founder_launch_gate
    - failure_mode_id: FAILED_LANE_REUSE_WITHOUT_REOPEN
      finding_class: governance
      summary: Previously failed assets or labels are reused as blueprints, build seeds, or proof of readiness without explicit reopen approval.
      hard_block_stages:
        - pre_run
        - 07_product_architecture_contract
        - 10_build_readiness_review
      close_at_or_before: 10_build_readiness_review
    - failure_mode_id: TARGET_AUDIENCE_PRODUCT_INVERSION
      finding_class: build
      summary: Product concept defined the target audience instead of evidence-backed target audience defining the product direction.
      hard_block_stages:
        - 02_target_audience_exploration
        - 05_target_audience_lock
        - 07_product_architecture_contract
      close_at_or_before: 07_product_architecture_contract
    - failure_mode_id: SCOPE_INFLATION_WITHOUT_EVIDENCE
      finding_class: build
      summary: Product scope grew beyond what market evidence supports through contract reasoning without per-feature evidence traces.
      hard_block_stages:
        - 07_product_architecture_contract
        - 09_workbook_or_product_blueprint
        - 10_build_readiness_review
      close_at_or_before: 10_build_readiness_review
    - failure_mode_id: REAL_WORLD_DECISION_LAYER_UNDERFIT
      finding_class: build
      summary: The contract solves an intermediate metric or sub-model but misses the buyer's real decision layer that evidence already implies.
      hard_block_stages:
        - 04_purchased_competitor_inspection
        - 05_target_audience_lock
        - 07_product_architecture_contract
        - 10_build_readiness_review
      close_at_or_before: 10_build_readiness_review
  pre_run:
    required_before_step_id: 00_market_evidence
    learning_loop_ref: governance/11_learning_loop.yaml
    product_lane_exclusion_ref: governance/product_lane_exclusions.yaml
    admission_rules_ref: governance/03_admission_rules.yaml
    ideas_run_template_ref: templates/ideas-run-template.yaml
    candidate_run_template_ref: templates/candidates-run-template.yaml
    company_memory_preflight_template_ref: templates/company-memory-preflight-template.yaml
    findings_ledger_template_ref: templates/findings-ledger-template.yaml
    canonical_failure_modes_catalog_ref: workflows/FLOW-007.yaml#canonical_failure_modes
    output_file_templates:
      ideas_run: records/ideas/IR-XXXX.yaml
      candidate_run: records/candidates/R-XXXX.yaml
      company_memory_preflight: records/run_preflight/CMR-XXXX.yaml
      findings_ledger: records/findings/FND-XXXX.yaml
    action:
      - generate_fresh_market_credible_idea_set_before_candidate_lock
      - require_at_least_three_distinct_idea_lanes_or_explicit_market_exhaustion_reason
      - run_tier_1_and_tier_2_admission_filters_on_each_idea
      - reject_if_current_candidate_lane_is_carried_forward_without_fresh_idea_generation
      - select_candidate_from_fresh_idea_set_with_why_this_lane_not_the_others_rationale
      - read_governance_product_lane_exclusions_before_any_new_run_starts
      - read_learning_loop_records_before_any_new_run_starts
      - load_failed_product_label_records_for_any_matched_or_related_lane
      - reject_if_candidate_thesis_matches_excluded_product_lane_without_human_reopen_record
      - read_docs_company_memory_before_any_new_run_starts
      - extract_applicable_lessons_from_company_memory
      - extract_applicable_active_memory_guards_and_map_each_to_owner_gate
      - read_open_failure_intake_postmortem_finding_patch_replay_and_learning_closure_records_for_related_lane
      - block_same_lane_run_if_any_applicable_learning_closure_is_not_FAILURE_CLOSED
      - reject_active_company_memory_rule_without_owner_gate_mapping
      - reject_active_company_memory_entry_without_passed_regression_replay
      - classify_each_applicable_lesson_as_build_finding_governance_finding_or_both
      - translate_current_evidence_into_canonical_failure_mode_assessments
      - require_each_canonical_failure_mode_to_be_marked_open_closed_or_not_applicable_for_this_run
      - map_build_findings_to_product_architecture_build_artifact_listing_delivery_or_launch_gates
      - map_governance_findings_to_flow_schema_model_budget_dispatch_dashboard_validator_or_memory_controls
      - record_open_run_blockers_with_owner_gates_due_gates_and_closure_requirements
      - block_run_if_company_memory_preflight_is_missing_stale_or_unreviewed
      - carry_open_findings_refs_forward_into_pac_build_readiness_artifact_inspection_pre_mortem_and_launch_gate
    gate:
      product_lane_exclusion_check_required: true
      fresh_idea_generation_required: true
      fresh_candidate_admission_required_before_market_evidence: true
      multiple_viable_ideas_required_before_candidate_lock: true
      candidate_selection_rationale_required: true
      failed_product_labels_required_for_excluded_failed_asset_lanes: true
      excluded_product_lane_blocks_run_before_market_evidence: true
      company_memory_preflight_required: true
      findings_ledger_required: true
      open_applicable_learning_failures_block_same_lane_run: true
      active_company_memory_rules_must_map_to_owner_gate: true
      memory_entry_without_regression_replay_cannot_be_active: true
      canonical_failure_modes_assessment_required: true
      applicable_findings_must_be_classified_before_market_evidence: true
      every_canonical_failure_mode_must_be_assessed_before_market_evidence: true
      open_run_blockers_must_have_owner_gate_and_due_gate: true
      build_findings_cannot_be_closed_by_governance_wording_only: true
      governance_findings_cannot_be_closed_by_artifact_generation_only: true
  on_failure:
    learning_loop_ref: governance/11_learning_loop.yaml
    trigger_learning_loop: LEARN-001
    failure_intake_required: true
    postmortem_required_for_serious_failures: true
    same_lane_next_run_blocked_until_learning_closure: true
  flow:
    - step_id: 00_market_evidence
      agent_tier: medium
      model_policy_ref: MODEL-007.market_evidence
      action:
        - start_from_category_or_market_thesis_not_locked_product_direction
        - collect_market_research_tool_or_export_evidence
        - confirm_real_market_signal
        - record_market_metrics_quality
        - identify_category_demand_price_range_top_products_new_entrants_buyer_language_promises_review_pain_points_feature_standards_sophistication_and_weak_spots
        - derive_commercially_credible_product_opportunity_from_market_evidence
        - record_product_direction_as_market_derived_or_unproven
        - reject_market_idea_as_build_input_without_architecture_contract
      output_file_template: records/market_evidence/ME-XXXX.yaml
      gate:
        market_evidence_status_required: PASS
        product_direction_must_be_derived_from_market_evidence_or_marked_unproven: true
        market_signal_alone_cannot_unlock_build: true
    - step_id: 01_public_shelf_read
      agent_tier: medium
      model_policy_ref: MODEL-007.public_shelf_read
      action:
        - collect_public_listing_evidence
        - collect_titles_thumbnails_images_descriptions_pricing_trust_signals_reviews
        - collect_market_metrics_when_tool_or_export_available
        - collect_gallery_thumbnail_or_listing_image_evidence
        - record_evidence_missing
        - classify_evidence_quality_as_pass_escalate_or_blocked
        - identify_product_surface_completeness_and_visual_standard
        - identify_risk_of_false_scope_or_niche_distortion
      output_file_template: records/public_shelf_read/PSR-XXXX.yaml
      gate:
        public_evidence_quality_pass_or_escalated_with_human_override_required: true
        no_unknown_market_metrics_without_escalation: true
        gallery_or_thumbnail_evidence_required_or_escalated: true
    - step_id: 02_target_audience_exploration
      agent_tier: medium
      model_policy_ref: MODEL-007.target_audience_exploration
      action:
        - consume_market_evidence_and_public_shelf_read
        - list_two_to_four_candidate_target_audiences_from_evidence
        - write_evidence_traced_jtbd_for_each_candidate_ta
        - label_each_jtbd_as_grounded_or_hypothesis
        - cross_out_tas_without_evidence_support_or_exceeding_price_point
        - select_preliminary_primary_ta_from_surviving_set
        - reject_if_all_tas_are_hypotheses
        - reject_if_fewer_than_two_candidate_tas
      output_file_template: records/target_audience_exploration/TAE-XXXX.yaml
      template_ref: templates/target-audience-exploration-template.yaml
      gate:
        target_audience_exploration_status_required: PASS
        minimum_candidate_tas_required: 2
        at_least_one_grounded_evidence_ref_per_surviving_ta: true
        preliminary_primary_ta_required: true
        jtbd_must_be_buyer_behavior_not_product_description: true
    - step_id: 03_competitor_selection_purchase_approval
      agent_tier: medium
      model_policy_ref: MODEL-007.competitor_selection
      action:
        - deterministically_select_one_competitor
        - select_from_evidence_backed_candidate_set_only
        - rank_by_match_tier_then_market_strength_then_visual_and_product_surface_completeness_then_price
        - refuse_lowest_friction_or_visible_price_as_primary_tie_breaker
        - verify_live_listing_url_title_seller_price_currency_discount_timestamp
        - record_revenue_reviews_age_seller_and_visual_evidence_or_escalate_if_unknown
        - record_benchmark_representativeness_risk
        - request_human_purchase_approval
        - complete_purchase_after_approval
      output_file_template: records/competitive_purchase_approval/CPA-XXXX.yaml
      gate:
        purchase_mandatory: true
        approval_required: true
        acquisition_required: true
        exactly_one_competitor_by_default: true
        incomplete_competitor_evidence_escalates_before_purchase: true
        additional_competitor_purchase_allowed_only_after_broken_inaccessible_or_unrepresentative_purchase: true
    - step_id: 04_purchased_competitor_inspection
      agent_tier: medium
      model_policy_ref: MODEL-007.purchased_competitor_inspection
      action:
        - inspect_purchased_or_approved_benchmark_product
        - inspect_purchased_asset_on_disposable_copy
        - record_access_status_and_benchmark_usability
        - inspect_hidden_buyer_experience
        - inspect_input_output_formula_onboarding_and_support_traps
        - classify_each_competitor_finding_as_market_evidence_build_requirement_or_not_our_blocker
        - note_competitor_broken_parts_as_avoidance_examples_only
        - identify_category_standard_learned
        - record_domain_standard_decision_outputs_seen_or_missing_in_benchmark
        - identify_real_world_decision_layer_decision_objective_and_aggregation_layer_in_benchmark
        - classify_benchmark_outputs_as_intermediate_or_terminal_decision_layers
        - identify_misleading_partial_models_that_look_complete_but_stop_short_of_real_buyer_decision_help
        - require_exactly_one_additional_purchase_or_equivalent_benchmark_evidence_if_purchased_artifact_is_broken_inaccessible_unrepresentative_or_insufficient_for_domain_standards
        - draft_benchmark_adequacy_review_for_frontier_approval
        - handoff_benchmark_adequacy_review_to_frontier_only
      output_file_template: records/competitor_autopsy/AUT-XXXX.yaml
      template_ref: templates/competitor-autopsy-template.yaml
      frontier_review_ref: MODEL-007.frontier_required.competitor_benchmark_adequacy_review
      gate:
        competitor_autopsy_status_required: PASS
        benchmark_adequacy_draft_may_be_medium: true
        benchmark_adequacy_final_review_required: true
        benchmark_adequacy_final_review_status_required: PASS
        benchmark_adequacy_final_review_model_required: gpt-5.5
        broken_inaccessible_shallow_or_unrepresentative_competitor_cannot_satisfy_benchmark: true
        unresolved_benchmark_adequacy_blocks_architecture: true
        real_world_decision_layer_extraction_required: true
    - step_id: 05_target_audience_lock
      agent_tier: frontier
      model_policy_ref: MODEL-007.frontier_required.target_audience_lock
      action:
        - consume_target_audience_exploration_and_competitor_autopsy
        - refine_surviving_tas_with_competitor_usage_pattern_evidence
        - cross_out_tas_contradicted_by_actual_competitor_usage
        - lock_exactly_one_primary_ta_and_jtbd
        - lock_decision_altitude_real_world_decision_objective_and_terminal_success_measure
        - record_evidence_chain_from_exploration_plus_competitor_inspection
        - reject_if_locked_jtbd_describes_product_not_buyer_behavior
        - reject_if_locked_ta_has_no_competitor_inspection_evidence
        - reject_if_locked_scope_stops_at_intermediate_metric_without_real_world_decision_objective
      output_file_template: records/target_audience_lock/TAL-XXXX.yaml
      template_ref: templates/target-audience-lock-template.yaml
      frontier_review_ref: MODEL-007.frontier_required.target_audience_lock
      gate:
        target_audience_lock_status_required: PASS
        exactly_one_primary_ta_locked: true
        locked_ta_evidence_from_both_exploration_and_inspection: true
        locked_jtbd_is_buyer_behavior_not_product_description: true
        real_world_decision_objective_required: true
        terminal_success_measure_required: true
        target_audience_lock_required_before_product_identity_reframe: true
    - step_id: 06_product_identity_reframe
      agent_tier: frontier
      model_policy_ref: MODEL-007.frontier_required.product_identity_reframe
      action:
        - consume_locked_target_audience_from_target_audience_lock
        - compare_market_category_label_to_actual_buyer_decision_product
        - define_product_identity
        - define_forbidden_old_product_identity
        - define_primary_buyer_decision
        - define_primary_buyer_promise
        - define_prohibited_generic_promises
        - define_required_product_class_delta_from_failed_baseline
        - reject_if_candidate_remains_same_product_class_as_failed_baseline
        - select_differentiation_strategy_better_execution_or_product_class_change
        - require_evidence_for_product_class_change_when_strategy_is_product_class_change
        - allow_same_product_class_when_strategy_is_better_execution_with_concrete_execution_advantages
      output_file_template: records/product_identity_reframe/PIR-XXXX.yaml
      template_ref: templates/product-identity-reframe-template.yaml
      gate:
        product_identity_status_required: PASS
        product_identity_must_not_equal_market_category_label_when_product_class_change: true
        forbidden_product_identity_terms_required: true
        product_class_delta_required_before_PAC: true
        same_failed_product_class_blocks_build: true
        differentiation_strategy_required: true
        better_execution_requires_concrete_execution_advantages: true
        product_class_change_requires_evidence_for_new_class: true
        locked_target_audience_consumed_required: true
    - step_id: 07_product_architecture_contract
      agent_tier: frontier
      escalation_allowed: []
      model_policy_ref: MODEL-007.frontier_required.product_architecture_contract
      action:
        - consume_locked_target_audience_from_target_audience_lock
        - consume_market_evidence_public_shelf_read_competitor_selection_purchased_inspection_and_product_identity_reframe
        - consume_company_memory_preflight_and_findings_ledger
        - consume_canonical_failure_mode_assessment_and_run_blockers
        - map_open_build_findings_into_architecture_contract_fields
        - map_open_governance_findings_into_build_readiness_or_control_blockers
        - resolve_or_map_each_applicable_canonical_failure_mode_into_contract_or_later_gate
        - verify_product_identity_reframe_passed_before_architecture_lock
        - define_target_audience_contract
        - define_exact_trigger_moment_capability_band_and_current_workaround_for_primary_buyer
        - define_assumed_prior_knowledge_and_irreducible_value_after_that_knowledge
        - define_real_world_decision_objective_decision_altitude_and_terminal_success_measure
        - reject_if_declared_buyer_must_already_do_the_full_judgment_without_meaningful_product_help
        - reject_if_audience_straddles_novice_and_expert_without_distinct_product_behavior_or_explicit_exclusion
        - define_buyer_behavior_contract
        - map_buyer_behavior_steps_to_required_inputs_transformations_decision_outputs_and_next_actions
        - define_domain_model_contract
        - define_domain_evidence_in_terms_of_intermediate_metrics_terminal_metrics_and_aggregation_layer
        - define_decision_dependencies_and_misleading_partial_models
        - define_domain_completion_rule_for_when_scope_reaches_real_buyer_decision_help
        - define_domain_invariants_that_must_never_be_presented_as_healthy_successful_or_no_action
        - define_setup_input_propagation_requirements_for_every_buyer_visible_setting
        - define_decision_output_contract
        - classify_outputs_as_intermediate_or_terminal_and_require_terminal_outputs_when_implied_by_evidence
        - define_machine_checkable_decision_output_locations_formula_or_logic_sources_and_truth_table_tests
        - define_working_capacity_requirements_not_demo_sample_only
        - define_visible_human_scale_capacity_floor_for_each_core_table
        - define_demo_vs_working_capacity_policy_with_few_seed_examples_and_blank_formula_ready_capacity
        - identify_prior_failed_artifact_baselines_when_same_domain_repair_or_postmortem_seeded
        - define_material_product_delta_required_against_each_failed_baseline_before_build
        - reject_failed_artifact_as_implicit_blueprint_even_when_it_provides_useful_blockers
        - define_seed_data_behavior_demo_requirements_that_prove_the_primary_decision_on_first_open
        - define_helper_behavior_scenario_as_step_by_step_input_to_transformation_to_output_to_next_action_walkthrough
        - define_support_risk
        - define_category_and_visual_format_standard
        - classify_architecture_status_without_building
        - trace_every_non_trivial_feature_sheet_or_output_to_specific_evidence_ref
        - flag_features_without_evidence_trace_as_builder_invention
        - reject_builder_inventions_unless_explicitly_human_approved
        - reject_scope_that_solves_only_an_intermediate_metric_without_reaching_the_real_world_decision_layer
      output_file_template: records/product_architecture_contract/PAC-XXXX.yaml
      template_ref: templates/product-architecture-contract-template.yaml
      gate:
        product_identity_status_required: PASS
        product_identity_must_not_equal_market_category_label: true
        forbidden_product_identity_terms_required: true
        product_class_delta_required_before_PAC: true
        same_failed_product_class_blocks_build: true
        target_audience_contract_status_required: PASS
        buyer_behavior_contract_status_required: PASS
        domain_model_contract_status_required: PASS
        decision_output_contract_status_required: PASS
        applicable_company_memory_findings_consumed_required: true
        applicable_canonical_failure_modes_must_be_mapped_into_contract_or_later_gate: true
        support_risk_acceptable_required: true
