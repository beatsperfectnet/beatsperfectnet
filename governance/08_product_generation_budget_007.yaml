product_generation_budget:
  budget_id: PGB-007
  flow_contract_ref: workflows/FLOW-007.yaml
  generation_budget_usd: 40.00
  first_three_pilot_cost_target_usd:
    min: 25.00
    max: 40.00
  budget_window:
    start_step_id: 00_market_evidence
    end_step_id: 17_founder_launch_gate
    excludes_competitor_purchase_spend: true
    includes_attributable_model_api_costs: true
    includes_paid_tool_usage_when_present: true
  phase_budget_plan:
    architecture_lock:
      stages:
        - 00_market_evidence
        - 01_public_shelf_read
        - 02_target_audience_exploration
        - 03_competitor_selection_purchase_approval
        - 04_purchased_competitor_inspection
        - 05_target_audience_lock
        - 06_product_identity_reframe
        - 07_product_architecture_contract
        - 08_scenario_matrix
        - 09_workbook_or_product_blueprint
        - 10_build_readiness_review
        - 11_pre_build_architecture_premortem
      soft_budget_usd: 8.00
    build_and_artifact_qa:
      stages:
        - 12_product_build
        - 13_real_artifact_inspection
        - 14_blind_buyer_walkthrough
      soft_budget_usd: 10.00
    listing_packaging_launch_gate:
      stages:
        - 15_listing_packaging_qa
        - 16_pre_mortem_failure_analysis
        - 17_founder_launch_gate
      soft_budget_usd: 7.00
  total_hard_budget_usd: 40.00
  hard_stop_rules:
    pause_before_build_if_projected_api_cost_exceeds_usd: 35.00
    hard_stop_at_api_model_cost_usd_unless_explicitly_approved: 40.00
    projected_total_above_budget_blocks_paid_call: true
    no_paid_rebuild_unless_product_architecture_contract_changed_materially: true
    architecture_failure_returns_to_product_architecture_contract_not_artifact_patch: true
    implementation_repair_loops_after_build_max: 1
    stop_or_escalate_if_product_fails_after_implementation_repair: true
    repeated_similar_artifact_regeneration_forbidden: true
    stronger_model_escalation_should_happen_before_build_readiness_approval: true
