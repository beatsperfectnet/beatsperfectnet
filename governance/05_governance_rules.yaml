 agent_owned:
  - workflow_execution
  - artifact_generation
  - outcome_recording
  - file_updates_inside_existing_schema

 agent_forbidden:
  - rule_changes
  - autonomous_spending
  - product_scope_invention_after_spec_lock
  - marketplace_publish_without_required_human_approval

 flow_rules:
  - FLOW_006_remains_stage_based
  - FLOW_006_adds_founder_acceptance_simulation_before_listing_work
  - functional_mandates_are_static_flow_metadata
  - models_must_not_assign_their_own_mandates
  - competitor_broken_parts_are_just_examples_of_what_to_avoid
  - candidate_domain_brief_is_required_before_competitor_selection
  - candidate_domain_brief_default_model_is_medium
  - frontier_domain_brief_review_is_escalation_only
  - market_evidence_controls_offer_and_scope
  - domain_expertise_controls_correctness_within_locked_scope
  - domain_reasoning_must_not_invent_market_demand
  - domain_reasoning_must_not_change_primary_buyer_jtbd
  - domain_reasoning_must_not_override_governance
  - correctness_requirements_must_not_create_new_buyer_workflows
  - prohibited_scope_expansions_must_not_enter_specs
  - build_agents_build_only_from_locked_specs
  - generic_best_in_class_persona_language_is_forbidden
  - domain_considerations_must_be_traceable_by_ID
  - incomplete_domain_brief_blocks_downstream_reasoning
  - material_domain_brief_revision_requires_downstream_rerun
  - gpt_5_mini_is_not_a_current_alias_for_gpt_5_4_mini
  - gpt_5_5_pro_is_disabled_for_normal_flow
  - quality_critical_stages_must_not_downgrade_automatically
  - generation_budget_covers_attributable_api_and_tool_costs_only
  - competitor_purchase_spend_is_separate_external_spend
  - shared_generation_cost_is_allocated_deterministically
  - budget_preflight_must_block_paid_calls_before_execution
  - launch_requires_generation_budget_pass
  - responses_api_is_preferred_when_supported_safely
  - structured_outputs_must_be_schema_validated_when_supported

 real_launched_products_require_real_marketplace_listing_url: true

 human_override:
  always_allowed: true
