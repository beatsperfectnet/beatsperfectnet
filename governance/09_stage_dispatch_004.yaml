stage_dispatch:
  purpose: exact_model_selection_per_flow_stage
  rule: every stage must run in a session pinned to the governed model before stage actions begin

  source_of_truth:
    - workflows/FLOW-004.yaml
    - specs/MODEL-004.yaml
    - governance/07_capacity_model.yaml

  dispatch_strategy:
    - resolve model_policy_ref for the stage
    - select the governed default model, or fallback or escalation model when the policy allows it
    - start or switch into a session pinned to the requested model
    - record the session model before stage execution
    - write the stage dispatch log before and after execution
    - halt and escalate if the exact model cannot be used

  enforcement:
    exact_model_match_required: true
    if_model_unavailable: stop_and_escalate
    if_dispatch_mismatch_detected: mark_run_noncompliant_and_stop_future_stages
    if_stage_is_not_run: record_not_run_and_do_not_fake_match

  allowed_runtime_actions:
    - spawn_child_session_with_model_override
    - switch_session_model
    - record_stage_dispatch_log
    - halt_and_escalate
    - human_gate

  stage_model_map:
