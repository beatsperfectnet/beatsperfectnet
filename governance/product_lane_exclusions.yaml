        - archive/candidates/C-010-001/C-010-001-REJECTED/product/Handyman-Quote-Readiness-Planner-google-sheets-import.xlsx
      reopen_requires:
        - explicit_human_reopen_record
        - company_memory_preflight_acknowledges_failed_label
        - material_product_delta_plan
      keyword_match_terms:
        - handyman estimate
        - handyman quote
        - handyman invoice
        - repair quote
        - repair estimate
        - scope to estimate
        - scope-to-quote
        - contractor estimate
        - contractor quote
        - job cost estimate
        - repair bid
        - service bid
