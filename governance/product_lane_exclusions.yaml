    - lane_id: etsy_pricing_decision_workbook
      status: excluded_by_ready_to_publish_candidate
      excluded_from_future_idea_runs: true
      excluded_from_flow_007_pre_run: true
      excluded_from_candidate_admission: true
      source_candidate_refs:
