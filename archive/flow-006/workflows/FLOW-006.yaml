FLOW-006:
  purpose: founder_acceptance_flow_for_publish_ready_human_products_and_listings
  rule: no_creativity_outside_assigned_task
  required_inputs:
    - company.md
    - governance/05_governance_rules.yaml
    - governance/06_resource_allocation.yaml
    - governance/07_capacity_model.yaml
    - governance/08_product_generation_budget_006.yaml
    - governance/09_stage_dispatch_006.yaml
    - specs/SCHEMA-006.yaml
    - specs/MODEL-006.yaml
    - specs/BLS-006.yaml
    - specs/TOOL-001.yaml
    - specs/FOUNDER-ACCEPTANCE-CORPUS-001.yaml
    - docs/COMPANY-MEMORY.md
  run_telemetry:
    runtime_launcher_ref: runtime/model-stage-launcher.mjs
    model_usage_ledger_required: true
    stage_dispatch_log_required: true
    exact_model_match_required: true
    required_model_usage_fields:
      - step_id
      - step_name
      - requested_model
      - requested_model_resolved
      - actual_model_used
      - prompt_tokens
      - completion_tokens
      - total_tokens
      - exact_match
      - notes
    required_stage_dispatch_fields:
      - step_id
      - requested_model
      - requested_model_resolved
      - session_model_observed
      - dispatch_match
  flow:
    - step_id: 00_candidate_admission
      agent_tier: mini
      model_policy_ref: MODEL-006.candidate_admission
      action:
        - confirm_allowed_category
        - confirm_no_prohibited_or_regulated_category
        - confirm_no_material_legal_risk
        - confirm_no_service_heavy_product
        - confirm_no_prohibited_external_api_dependency
        - confirm_no_subscription_required_product
        - confirm_expected_support_within_constraints
        - confirm_market_demand_threshold_passed
        - confirm_market_research_tool_or_export_ready
        - refuse_historical_memory_or_generic_search_as_market_demand_substitute
        - record_market_evidence_quality_and_missing_inputs
        - confirm_marketplace_identified
        - confirm_product_type_identified
      output_file_template: records/candidate_admission/CA-XXXX.yaml
      gate:
        admitted_required: true
        market_research_tool_ready_or_explicit_human_override_required: true
        market_demand_evidence_quality_pass_required: true
        competitor_purchase_required: true
        competitor_purchase_approval_required: true
        api_budget_ceiling_usd: 25
    - step_id: 01_public_shelf_read
      agent_tier: medium
      model_policy_ref: MODEL-006.public_shelf_read_synthesis
      action:
        - collect_public_listing_evidence
        - collect_titles_thumbnails_images_descriptions_pricing_trust_signals_reviews
        - collect_market_metrics_when_tool_or_export_available
        - collect_gallery_thumbnail_or_listing_image_evidence
        - record_evidence_missing
        - classify_evidence_quality_as_pass_escalate_or_blocked
        - escalate_if_required_market_inputs_are_missing_or_ambiguous
        - identify_insight_kpp_hook_signals
        - identify_visible_rtb_signals
        - record_risk_of_false_scope
      output_file_template: records/public_shelf_read/PSR-XXXX.yaml
      gate:
        public_evidence_quality_pass_or_escalated_with_human_override_required: true
        no_unknown_market_metrics_without_escalation: true
        gallery_or_thumbnail_evidence_required_or_escalated: true
    - step_id: 02_mandatory_competitor_purchase
      agent_tier: medium
      model_policy_ref: MODEL-006.competitor_selection
      action:
        - deterministically_select_one_competitor
        - select_from_evidence_backed_candidate_set_only
        - rank_by_match_tier_then_market_strength_then_visual_and_product_surface_completeness_then_price
        - refuse_lowest_friction_or_visible_price_as_primary_tie_breaker
        - verify_live_listing_url_title_seller_price_currency_discount_timestamp
        - record_revenue_reviews_age_seller_and_visual_evidence_or_escalate_if_unknown
        - record_benchmark_representativeness_risk
        - request_human_purchase_approval
        - complete_purchase_after_approval
      gate:
        purchase_mandatory: true
        approval_required: true
        acquisition_required: true
        exactly_one_competitor_by_default: true
        incomplete_competitor_evidence_escalates_before_purchase: true
        additional_competitor_purchase_allowed_after_broken_or_unrepresentative_purchase: true
      output_file_template: records/competitive_purchase_approval/CPA-XXXX.yaml
    - step_id: 03_hidden_buyer_experience_inspection
      agent_tier: medium
      model_policy_ref: MODEL-006.purchased_competitor_inspection
      action:
        - inspect_purchased_asset_on_disposable_copy
        - record_delivery_path_first_open_normal_use_limits_stress_recovery
        - record_actual_delivered_visual_quality
        - record_support_traps_and_originality_boundary
        - separate_marketplace_trust_signals_from_product_rtb_signals
        - note_competitor_broken_parts_as_avoidance_examples_only
        - classify_each_competitor_finding_as_market_evidence_build_requirement_or_not_our_blocker
        - record_benchmark_adequacy_for_downstream_build
        - require_additional_purchase_or_equivalent_benchmark_evidence_if_purchased_artifact_is_broken_unrepresentative_or_insufficient_for_domain_standards
        - record_formula_protection_recovery_and_breakage_risks_as_testable_requirements
        - record_domain_standard_decision_outputs_seen_or_missing_in_benchmark
        - record_boundary_rows_ranges_calculation_paths_and_platform_claim_risks_for_spreadsheets
        - record_period_model_horizon_carry_forward_and_handoff_expectations_for_periodic_products
      output_file_template: records/purchased_competitor_inspection/PCI-XXXX.yaml
    - step_id: 04_alignment_synthesis
      agent_tier: frontier
      model_policy_ref: MODEL-006.alignment_synthesis
      action:
        - compress_public_and_hidden_evidence_into_one_chain
        - reject_scope_lists_as_kpp
        - reject_marketplace_trust_signals_as_rtb
        - identify_one_primary_buyer_job
        - define_one_buyer_behavior_loop_with_trigger_starting_state_steps_expected_outcome_next_action_and_failure_states
        - identify_one_kpp_as_buyer_decision_promise
        - identify_one_rtb_system_as_product_specific_proof_mechanism
        - identify_one_hook_hypothesis
        - derive_machine_checkable_jtbd_kpp_rtb_contract_seed
        - define_primary_buyer_decision_in_plain_operational_terms
        - reject_jtbd_definition_that_names_only_product_category_feature_scope_or_output_without_real_buyer_behavior
        - record_excluded_scope
      output_file_template: records/alignment_chain/AC-XXXX.yaml
    - step_id: 05_one_promise_propagation_system_spec
      agent_tier: frontier
      model_policy_ref: MODEL-006.one_promise_propagation_system_spec
      action:
        - define_one_system_name
        - consume_alignment_chain_and_benchmark_adequacy
        - define_buyer_behavior_contract_before_build
        - define_machine_checkable_product_contract_before_build
        - map_buyer_behavior_steps_to_required_inputs_transformations_decision_outputs_and_next_actions
        - define_primary_buyer_decision_outputs_required_by_jtbd_and_kpp
        - define_required_input_to_decision_output_map
        - define_domain_invariants_that_must_never_be_presented_as_healthy_or_successful_states
        - define_domain_standard_requirements_and_forbidden_shallow_substitutes
        - define_derived_reorder_point_policy_for_inventory_replenishment_from_lead_time_sales_velocity_and_buffer
        - forbid_reorder_point_as_buyer_input_when_lead_time_sales_velocity_and_buffer_can_derive_it
        - define_negative_on_hand_handling_as_block_or_review_not_healthy_no_action_or_publishable
        - define_supported_platform_boundaries
        - define_support_prevention
        - define_formula_protection_mode_and_recovery
        - define_stated_limits
        - define_required_product_surfaces
        - define_working_capacity_requirements_not_demo_sample_only
        - define_visible_human_scale_capacity_floor_for_each_core_table
        - define_prior_failed_artifact_baseline_and_material_delta_requirements
        - define_row_expansion_and_formula_range_acceptance_requirements_for_spreadsheets
        - define_visual_reference_contract
        - define_artifact_integrity_audit_requirements
        - define_formula_truth_table_and_boundary_mutation_tests
        - define_jtbd_truth_table_tests_generated_from_primary_buyer_decision
        - define_adversarial_buyer_scenarios_generated_from_behavior_failures_and_domain_invariants
        - define_demo_vs_working_capacity_policy_with_few_seed_examples_and_blank_formula_ready_capacity
        - define_helper_behavior_scenario_as_step_by_step_input_to_transformation_to_output_to_next_action_walkthrough
        - define_setup_input_propagation_requirements_for_every_buyer_visible_setting
        - define_time_horizon_model_before_build
        - define_period_model_carry_forward_and_handoff_requirements
        - require_rolling_horizon_for_calendar_sensitive_spreadsheets_unless_marketplace_evidence_requires_fixed_year
        - state_that_competitor_breakage_does_not_block_our_ship
        - keep_competitor_failure_risks_separate_from_our_artifact_publish_blockers
        - define_publish_blockers_for_missing_or_prose_only_evidence
      output_file_template: records/propagation_system_spec/PSS-XXXX.yaml
      gate:
        buyer_behavior_contract_required: true
        machine_checkable_product_contract_required: true
        primary_buyer_decision_outputs_required: true
        adversarial_buyer_scenarios_required: true
        domain_invariants_required: true
        derived_reorder_point_policy_required_when_inventory_replenishment_applicable: true
        negative_on_hand_handling_required_when_inventory_applicable: true
        helper_behavior_scenario_required: true
        jtbd_truth_table_required: true
        benchmark_adequacy_resolved_before_build_required: true
        shallow_status_or_feature_substitute_for_kpp_forbidden: true
    - step_id: 06_first_pass_connected_build
      agent_tier: medium
      model_policy_ref: MODEL-006.first_pass_connected_build
      action:
        - consume_buyer_behavior_contract
        - consume_machine_checkable_product_contract
        - build_minimum_connected_product
        - implement_every_required_input_because_a_buyer_behavior_step_requires_it
        - implement_every_transformation_because_it_converts_buyer_inputs_into_decision_outputs
        - implement_primary_buyer_decision_outputs_from_contract
        - implement_next_action_map_so_each_decision_output_tells_the_buyer_what_to_do
        - implement_required_input_to_decision_output_map
        - derive_reorder_point_from_lead_time_sales_velocity_and_buffer_when_inventory_replenishment_applicable
        - do_not_expose_reorder_point_as_buyer_input_when_it_is_contractually_derived
        - implement_domain_invariant_flags_or_blocks_before_any_healthy_success_status
        - block_or_flag_negative_on_hand_before_any_healthy_success_no_action_or_publish_state
        - build_working_capacity_product_not_demo_scale_sample
        - keep_seed_data_to_a_small_demo_set_and_leave_remaining_working_capacity_blank_but_formula_ready
        - keep_non_seed_capacity_rows_empty_for_buyer_use_while_preserving_formulas_validation_and_expansion
        - build_start_here_helper_as_clear_step_by_step_behavior_scenario_not_vague_feature_guidance
        - build_visible_buyer_usable_rows_tables_and_expansion_path_not_hidden_capacity_only
        - materially_change_any_prior_failed_good_enough_demo_artifact_before_continuing
        - implement_real_hook_surface
        - apply_brandbook_visual_identity
        - keep_editable_generated_and_protected_areas_clear
        - produce_machine_checkable_artifact_manifest
        - record_machine_checkable_product_contract_ref
        - record_buyer_behavior_contract_ref
        - record_primary_buyer_decision_output_manifest
        - record_buyer_behavior_to_next_action_manifest
        - record_adversarial_scenario_coverage_manifest
        - record_jtbd_output_manifest
        - record_setup_input_usage_manifest
        - record_formula_ranges_editable_ranges_protection_mode_and_platform_claims
        - record_working_capacity_row_limits_and_expansion_behavior
        - record_visible_row_counts_table_capacity_and_prior_artifact_delta
        - record_time_horizon_carry_forward_and_rollover_surfaces
        - do_not_label_recovery_only_areas_as_protected
      gate:
        visible_human_scale_capacity_required: true
        material_delta_against_prior_failed_artifact_required: true
        regenerated_timestamps_do_not_count_as_artifact_delta: true
        buyer_behavior_contract_consumed_required: true
        machine_checkable_product_contract_consumed_required: true
        primary_buyer_decision_outputs_implemented_required: true
        derived_reorder_point_implemented_when_applicable: true
        negative_on_hand_block_or_flag_required_when_applicable: true
        non_seed_capacity_blank_formula_ready_required: true
        helper_behavior_scenario_implemented_required: true
      output_file_template: builds/<candidate_id>/manifest.yaml
    - step_id: 07_propagation_buyer_experience_product_visual_qa
      agent_tier: medium
      model_policy_ref: MODEL-006.qa_execution
      action:
        - run_deterministic_artifact_integrity_audit
        - run_formula_truth_table_tests
        - run_jtbd_truth_table_tests_against_primary_buyer_decision_outputs
        - run_buyer_behavior_walkthrough_tests_against_visible_workbook_instructions
        - run_executable_adversarial_scenario_mutation_tests_on_temporary_artifact_copy
        - run_setup_input_propagation_tests_for_every_buyer_visible_setting
        - fail_if_mutation_tests_only_inspect_formula_references_without_recalculated_before_after_outputs
        - fail_if_domain_invariant_violation_is_labeled_healthy_successful_or_no_action_without_review
        - fail_if_negative_on_hand_is_labeled_healthy_successful_no_action_or_publishable
        - fail_if_reorder_point_is_buyer_input_when_it_should_be_derived_from_lead_time_sales_velocity_and_buffer
        - fail_if_all_working_capacity_rows_are_prefilled_instead_of_few_seed_examples_plus_blank_formula_ready_rows
        - fail_if_helper_does_not_walk_buyer_step_by_step_from_inputs_to_results_to_next_action
        - fail_if_kpp_is_satisfied_only_by_feature_list_status_label_or_dashboard_count
        - fail_if_required_decision_output_is_missing_from_artifact
        - run_boundary_mutation_tests
        - run_working_capacity_and_row_expansion_tests_for_spreadsheets
        - run_visible_capacity_floor_tests_for_core_buyer_tables
        - compare_visible_capacity_against_prior_failed_artifact
        - run_period_continuity_and_handoff_tests_when_applicable
        - fail_if_start_period_mutation_does_not_shift_displayed_period_labels
        - fail_if_next_period_opening_balance_does_not_link_to_prior_closing_balance
        - fail_if_final_period_has_no_next_workbook_seed_or_closeout_state
        - fail_if_tab_names_or_listing_copy_imply_stale_fixed_year_without_explicit_evidence
        - verify_formula_protection_or_truthful_recovery_only_labeling
        - verify_listing_eligible_surfaces_are_from_delivered_artifacts
        - fail_if_artifact_is_demo_scale_only
        - test_propagation
        - test_buyer_experience
        - test_product_visual_quality
        - allow_one_total_product_repair
      gate:
        artifact_integrity_audit_required: true
        spreadsheet_formula_audit_required_when_applicable: true
        buyer_behavior_walkthrough_required: true
        executable_adversarial_scenario_mutations_required: true
        jtbd_truth_table_required: true
        primary_buyer_decision_outputs_required: true
        setup_input_propagation_required: true
        spreadsheet_capacity_audit_required_when_applicable: true
        visible_capacity_floor_required_when_applicable: true
        artifact_delta_against_prior_failed_version_required: true
        period_continuity_audit_required_when_applicable: true
        protection_truthfulness_required: true
        negative_on_hand_invariant_required_when_inventory_applicable: true
        derived_reorder_point_required_when_inventory_replenishment_applicable: true
        blank_formula_ready_capacity_required: true
        helper_behavior_walkthrough_required: true
        prose_only_qa_forbidden: true
      output_file_template: records/validation/QA-XXXX.yaml
    - step_id: 08_founder_acceptance_simulation
      agent_tier: frontier
      model_policy_ref: MODEL-006.founder_acceptance_simulation
      corpus_ref: specs/FOUNDER-ACCEPTANCE-CORPUS-001.yaml
      functional_mandate: adversarial_founder_acceptance_reviewer
      action:
        - consume_founder_rejection_corpus
        - simulate_founder_product_inspection_before_publication
        - directly_inspect_current_artifact_not_only_records
        - inspect_machine_checkable_product_contract_and_artifact_evidence
        - inspect_buyer_behavior_contract_and_next_action_map
        - compare_current_product_to_prior_failed_artifact_for_material_delta
        - pressure_test_real_human_use_beyond_seed_demo_rows
        - run_blind_buyer_behavior_walkthrough_from_first_open_to_next_action
        - test_formula_logic_workflow_logic_and_buyer_decision_outputs
        - inspect_derived_reorder_point_logic_for_inventory_replenishment_products
        - fail_if_negative_on_hand_or_other_domain_impossibility_is_presented_as_healthy_no_action_or_publishable
        - fail_if_reorder_point_is_exposed_as_buyer_input_when_lead_time_sales_velocity_and_buffer_should_derive_it
        - fail_if_all_buyer_capacity_rows_are_prefilled_instead_of_blank_formula_ready_after_seed_examples
        - fail_if_helper_or_start_here_is_not_a_clear_step_by_step_behavior_scenario
        - fail_if_jtbd_is_defined_as_output_or_feature_scope_without_buyer_behavior_loop
        - fail_if_adversarial_buyer_scenarios_are_missing_or_only_described_without_artifact_mutation_evidence
        - fail_if_primary_jtbd_decision_outputs_are_missing_or_only_in_prose
        - fail_if_kpp_is_reduced_to_status_snapshot_feature_list_or_visual_dashboard
        - inspect_in_product_wording_for_human_language_not_developer_or_agent_language
        - inspect_delivery_copy_for_customer_handoff_clarity
        - define_listing_hook_rejection_criteria_before_asset_assembly
        - run_cost_outcome_accountability_review
        - classify_rejection_patterns_by_corpus_id
        - fail_if_product_requires_founder_feedback_to_be_publishable
        - fail_if_current_artifact_is_same_demo_workbook_after_rerun
        - fail_if_paid_rerun_produced_same_outcome
        - define_required_repair_scope_and_rerun_from_step
        - allow_human_override_only_when_explicitly_recorded
      gate:
        founder_acceptance_status_required: pass
        adversarial_rejection_attempt_required: true
        corpus_pattern_check_required: true
        real_human_use_pressure_required: true
        machine_checkable_product_contract_required: true
        buyer_behavior_contract_required: true
        blind_buyer_behavior_walkthrough_required: true
        adversarial_scenario_evidence_required: true
        jtbd_decision_output_evidence_required: true
        direct_artifact_inspection_required: true
        material_artifact_delta_required: true
        cost_outcome_accountability_required: true
        in_product_copy_human_review_required: true
        delivery_copy_human_review_required: true
        inventory_replenishment_logic_review_required_when_applicable: true
        helper_behavior_scenario_review_required: true
      output_file_template: records/validation/FA-XXXX.yaml
    - step_id: 09_optional_supporting_feature_pass
      agent_tier: medium
      model_policy_ref: MODEL-006.optional_supporting_feature_pass
      action:
        - consider_one_supporting_feature_only_after_qa_pass
      gate:
        optional_feature_attempts_max: 1
    - step_id: 10_listing_creative_assembly
      agent_tier: medium
      model_policy_ref: MODEL-006.listing_title_description_and_claim_map_assembly
      action:
        - consume_founder_acceptance_ref
        - assemble_listing_from_verified_surfaces
        - define_visual_hook_strategy_for_listing_grid_browsing
        - define_specific_real_hook_for_each_listing_image
        - map_each_claim_to_proof
        - map_each_insight_kpp_rtb_claim_to_verified_artifact_evidence
        - align_each_image_promise_to_jtbd_and_each_rtb_to_that_promise
        - record_grid_stop_reason_and_hook_delta_for_each_image
        - exclude_unverified_compatibility_or_protection_claims
        - generate_final_etsy_ready_creatives_from_verified_product_surfaces
        - use_real_product_surface_zoom_mockup_or_composition_as_eye_stopper_not_report_slide
        - record_source_surface_claim_map_for_each_final_creative
        - forbid_fabricated_product_screens_or_unverified_ui_states
      output_file_template: records/listing_creatives/LC-XXXX.yaml
    - step_id: 11_listing_quality_gate
      agent_tier: frontier
      model_policy_ref: MODEL-006.listing_quality_gate
      action:
        - consume_founder_acceptance_ref
        - judge_shelf_communication_parity
        - judge_visual_hook_strength_against_real_marketplace_grid
        - judge_each_image_has_real_hook_not_only_clean_layout_or_screenshot_presence
        - compare_listing_hook_strength_against_prior_hookless_assets
        - verify_kpp_is_buyer_decision_promise_not_feature_scope
        - verify_each_creative_has_one_promise_and_aligned_reason_to_believe
        - verify_rtb_is_product_specific_evidence_not_marketplace_trust_signal
        - verify_claim_map_targets_passed_artifact_audit_evidence
        - verify_final_creatives_are_built_from_verified_surfaces
        - fail_if_text_overlaps_clips_or_product_surface_is_too_small_to_prove_claim
        - fail_if_clean_assets_lack_real_hook
        - fail_if_visuals_are_mediocre_or_default_looking
        - fail_if_product_surface_fidelity_or_formula_truthfulness_is_unverified
      output_file_template: records/validation/LQ-XXXX.yaml
    - step_id: 11b_pre_mortem_failure_analysis
      agent_tier: frontier
      model_policy_ref: MODEL-006.pre_mortem_failure_analysis
      functional_mandate: pre_launch_commercial_failure_analysis
      action:
        - assume_product_launched_and_failed_with_zero_sales_refunds_or_weak_conversion
        - inspect_delivered_product_assets
        - inspect_listing_images_title_and_description
        - inspect_delivery_readme_and_onboarding
        - inspect_founder_acceptance_result
        - inspect_qa_result
        - inspect_public_shelf_evidence
        - inspect_purchased_competitor_inspection
        - inspect_company_memory
        - audit_product_logic_blockers_against_company_memory_and_founder_corpus
        - inspect_helper_or_start_here_for_step_by_step_behavior_scenario
        - inspect_inventory_replenishment_logic_for_derived_reorder_point_and_negative_on_hand_handling_when_applicable
        - inspect_working_capacity_for_few_seed_examples_plus_blank_formula_ready_rows
        - identify_top_3_likely_failure_modes_using_only_current_product_listing_delivery_and_market_evidence
        - record_evidence_for_each_failure_mode
        - classify_each_failure_mode_as_product_listing_delivery_market_fit_promise_pricing_or_trust
        - classify_each_failure_mode_as_launch_blocker_or_watchlist
        - require_specific_preventable_cause_before_launch_blocker
        - set_rerun_from_earliest_relevant_step_for_each_launch_blocker
        - set_post_launch_signal_to_monitor_for_each_watchlist_risk
        - allow_publish_gate_to_continue_when_only_watchlist_risks_remain
        - run_once_only_before_delivery_launch
        - forbid_new_product_scope_unless_locked_buyer_behavior_jtbd_or_marketplace_evidence_proves_the_failure
        - downgrade_unproven_feature_ideas_to_watchlist_or_reject_as_feature_bloat
      gate:
        pre_mortem_status_required: pass_or_watchlist_only
        top_3_failure_modes_required: true
        evidence_required_for_each_failure_mode: true
        failure_mode_classification_required: true
        blocker_requires_specific_preventable_cause: true
        blocker_requires_rerun_from_step: true
        watchlist_requires_post_launch_signal: true
        unsupported_scope_expansion_forbidden: true
        product_logic_blocker_audit_required: true
        helper_behavior_scenario_audit_required: true
        one_pass_only: true
      output_file_template: records/validation/PM-XXXX.yaml
    - step_id: 12_delivery_launch
      agent_tier: mini
      model_policy_ref: MODEL-006.delivery_assembly
      action:
        - assemble_delivery_package
        - prepublish_validate
        - run_total_cost_outcome_accountability_before_ready_status
        - block_publish_when_any_required_audit_is_missing_failed_or_prose_only
        - set_ready_for_marketplace_publish_only_after_artifact_listing_delivery_and_blocker_gates_pass
