stage_dispatch:
  purpose: exact_model_selection_per_flow_stage
  rule: every stage must run in a session pinned to the governed model before stage actions begin
  source_of_truth:
    - workflows/FLOW-006.yaml
    - specs/MODEL-006.yaml
    - governance/08_product_generation_budget_006.yaml
  enforcement:
    exact_model_match_required: true
    if_model_unavailable: stop_and_escalate
    if_dispatch_mismatch_detected: mark_run_noncompliant_and_stop_future_stages
  allowed_runtime_actions:
    - spawn_child_session_with_model_override
    - switch_session_model
    - record_stage_dispatch_log
    - halt_and_escalate
    - human_gate
  stage_model_map:
    00_candidate_admission:
      model_policy_ref: MODEL-006.candidate_admission
      governed_model_tier: mini
      requested_model: gpt-5.4-mini
      runtime_resolved_model_id: openai/gpt-5.4-mini
      dispatch_action: switch_session_model
    01_public_shelf_read:
      model_policy_ref: MODEL-006.public_shelf_read_synthesis
      governed_model_tier: medium
      requested_model: gpt-5.4
      runtime_resolved_model_id: openai/gpt-5.4
      dispatch_action: switch_session_model
    02_mandatory_competitor_purchase:
      model_policy_ref: MODEL-006.competitor_selection
      governed_model_tier: medium
      requested_model: gpt-5.4
      runtime_resolved_model_id: openai/gpt-5.4
      dispatch_action: human_gate
    03_hidden_buyer_experience_inspection:
      model_policy_ref: MODEL-006.purchased_competitor_inspection
      governed_model_tier: medium
      requested_model: gpt-5.4
      runtime_resolved_model_id: openai/gpt-5.4
      dispatch_action: switch_session_model
    04_alignment_synthesis:
      model_policy_ref: MODEL-006.alignment_synthesis
      governed_model_tier: frontier
      requested_model: gpt-5.5
      runtime_resolved_model_id: openai/gpt-5.5
      dispatch_action: switch_session_model
    05_one_promise_propagation_system_spec:
      model_policy_ref: MODEL-006.one_promise_propagation_system_spec
      governed_model_tier: frontier
      requested_model: gpt-5.5
      runtime_resolved_model_id: openai/gpt-5.5
      dispatch_action: switch_session_model
    06_first_pass_connected_build:
      model_policy_ref: MODEL-006.first_pass_connected_build
      governed_model_tier: medium
      requested_model: gpt-5.4
      runtime_resolved_model_id: openai/gpt-5.4
      dispatch_action: switch_session_model
    07_propagation_buyer_experience_product_visual_qa:
      model_policy_ref: MODEL-006.qa_execution
      governed_model_tier: medium
      requested_model: gpt-5.4
      runtime_resolved_model_id: openai/gpt-5.4
      dispatch_action: switch_session_model
      deterministic_subgates:
        - artifact_integrity_audit
        - buyer_behavior_walkthrough_validation
