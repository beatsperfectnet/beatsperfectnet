<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="1600" viewBox="0 0 2000 1600">
  <rect width="2000" height="1600" fill="#f5f7f2"/>
  <rect x="88" y="86" width="1824" height="1428" rx="42" fill="#ffffff" stroke="#d8e1e8" stroke-width="4"/>
  <rect x="88" y="86" width="1824" height="26" rx="13" fill="#4e7c59"/>
  <text x="140" y="180" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#4e7c59">PRICE LIST</text>
  <text x="140" y="292" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800" fill="#183153">Save approved prices</text>
  <text x="140" y="360" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800" fill="#183153">beside the inventory</text>
  <text x="140" y="428" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800" fill="#183153">decisions you act on.</text>
  <text x="140" y="532" font-family="Inter, Arial, sans-serif" font-size="34" fill="#183153">Once a price works, the buyer</text>
  <text x="140" y="574" font-family="Inter, Arial, sans-serif" font-size="34" fill="#183153">can keep it as a reusable</text>
  <text x="140" y="616" font-family="Inter, Arial, sans-serif" font-size="34" fill="#183153">snapshot instead of rebuilding</text>
  <text x="140" y="658" font-family="Inter, Arial, sans-serif" font-size="34" fill="#183153">the math every time.</text>
  <rect x="140" y="764" width="520" height="84" rx="16" fill="#4e7c59" opacity="0.14"/>
  <text x="170" y="819" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#183153">Saved price bank</text>
  <rect x="140" y="870" width="560" height="104" rx="14" fill="#f8fafc" stroke="#d8e1e8" stroke-width="2"/>
  <text x="170" y="909" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#183153">Grid stop: Approved price snapshots</text>
  <text x="170" y="932" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#183153">support reorder confidence.</text>
  <rect x="850" y="190" width="940" height="910" rx="28" fill="#eef3f5" stroke="#d8e1e8" stroke-width="3"/>
  <rect x="886" y="230" width="868" height="830" rx="18" fill="#ffffff" stroke="#d8e1e8" stroke-width="2"/>
  <clipPath id="proofClip">
    <rect x="906" y="250" width="828" height="790" rx="12"/>
  </clipPath>
  <image x="906" y="250" width="828" height="790" preserveAspectRatio="xMidYMin slice" clip-path="url(#proofClip)" href="data:image/png;base64,"/>
  <rect x="140" y="1185" width="1630" height="170" rx="22" fill="#f8fafc" stroke="#d8e1e8" stroke-width="2"/>
  <text x="180" y="1250" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#183153">Proof from the shipped workbook</text>
  <text x="180" y="1305" font-family="Inter, Arial, sans-serif" font-size="28" fill="#183153">Price List stores saved product snapshots and status tags across 100 buyer-usable</text>
  <text x="180" y="1341" font-family="Inter, Arial, sans-serif" font-size="28" fill="#183153">rows after the calculator validates margin.</text>
  <text x="140" y="1465" font-family="IBM Plex Mono, Menlo, monospace" font-size="24" fill="#5a6472">BeatsPerfect Inventory Tracker Studio</text>
</svg>
