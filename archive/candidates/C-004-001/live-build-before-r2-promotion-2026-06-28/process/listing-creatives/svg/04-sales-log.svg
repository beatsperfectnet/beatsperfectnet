<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="1600" viewBox="0 0 2000 1600">
  <rect width="2000" height="1600" fill="#f5f7f2"/>
  <rect x="88" y="86" width="1824" height="1428" rx="42" fill="#ffffff" stroke="#d8e1e8" stroke-width="4"/>
  <rect x="88" y="86" width="1824" height="26" rx="13" fill="#d9a441"/>
  <text x="140" y="180" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#d9a441">SALES</text>
  <text x="140" y="292" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800" fill="#183153">Let 500 sales rows</text>
  <text x="140" y="360" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800" fill="#183153">calculate velocity and</text>
  <text x="140" y="428" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800" fill="#183153">projected stockout</text>
  <text x="140" y="496" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800" fill="#183153">dates.</text>
  <text x="140" y="600" font-family="Inter, Arial, sans-serif" font-size="34" fill="#183153">Recent sales drive days of</text>
  <text x="140" y="642" font-family="Inter, Arial, sans-serif" font-size="34" fill="#183153">cover, reorder-by date, and</text>
  <text x="140" y="684" font-family="Inter, Arial, sans-serif" font-size="34" fill="#183153">order quantity so fast sellers</text>
  <text x="140" y="726" font-family="Inter, Arial, sans-serif" font-size="34" fill="#183153">surface first.</text>
  <rect x="140" y="832" width="520" height="84" rx="16" fill="#d9a441" opacity="0.14"/>
  <text x="170" y="887" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#183153">500-row sales signal</text>
  <rect x="140" y="938" width="560" height="104" rx="14" fill="#f8fafc" stroke="#d8e1e8" stroke-width="2"/>
  <text x="170" y="977" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#183153">Grid stop: Sales volume becomes a</text>
  <text x="170" y="1000" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#183153">stockout warning.</text>
  <rect x="900" y="210" width="870" height="860" rx="28" fill="#eef3f5" stroke="#d8e1e8" stroke-width="3"/>
  <rect x="936" y="250" width="798" height="780" rx="18" fill="#ffffff" stroke="#d8e1e8" stroke-width="2"/>
  <image x="970" y="292" width="730" height="696" preserveAspectRatio="xMidYMid meet" href="data:image/png;base64,"/>
  <rect x="140" y="1185" width="1630" height="170" rx="22" fill="#f8fafc" stroke="#d8e1e8" stroke-width="2"/>
  <text x="180" y="1250" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#183153">Proof from the shipped workbook</text>
  <text x="180" y="1305" font-family="Inter, Arial, sans-serif" font-size="28" fill="#183153">Sales log drives sales velocity, days cover, projected stockout, revenue, COGS,</text>
  <text x="180" y="1341" font-family="Inter, Arial, sans-serif" font-size="28" fill="#183153">fees, and gross profit across 500 buyer-usable rows.</text>
  <text x="140" y="1465" font-family="IBM Plex Mono, Menlo, monospace" font-size="24" fill="#5a6472">BeatsPerfect Inventory Tracker Studio</text>
</svg>
