public_shelf_read:
  candidate_id: C-004-001
  evidence_refs:
    - openclaw web_search query "site:etsy.com inventory tracker spreadsheet Etsy listing reorder alerts BOM vendors purchases sales"
    - openclaw web_search query "site:etsy.com \"inventory tracker spreadsheet\" google sheets excel dashboard vendors purchases sales Etsy"
    - openclaw web_search query "site:etsy.com \"small business inventory tracker\" spreadsheet Etsy Google Sheets"
    - openclaw web_search query "site:etsy.com \"apparel inventory tracker\" excel spreadsheet Etsy"
  evidence_missing:
    - listing_gallery_thumbnail_screenshots
  insight_signals:
    - Buyers respond to a finished workbook with a clear inventory promise, visible setup guidance, and dashboard-style utility proof.
    - Inventory listings sell best when stock, supplier, purchase, and sales surfaces are visible in the copy.
  kpp_signals:
    - Know what is in stock, what is moving, and what needs to be reordered without manual counting.
  complaint_signals:
    - Inventory setup is confusing if the workbook is too bare.
    - Stock math feels fragile if purchase and sales paths are unclear.
  hook_signals:
    - Inventory tracker with reorder support and dashboard summaries.
    - Inventory management workbook with supplier, purchase, and sales visibility.
  visible_rtb_signals:
    - Google Sheets and Excel compatibility on premium listings.
    - Dashboard, BOM, suppliers, purchases, and sales surfaces in stronger benchmark titles.
    - Quick start guides and tutorial assets in higher-value inventory templates.
  bestseller_visual_reference:
    - Dashboard-heavy workbook preview with clear inventory, profit, and stock-status cards plus compatibility cues.
  competitor_candidates:
    - Inventory Tracker Spreadsheet Small Business Inventory Template Google Sheets Inventory Tracker Management Inventory Log List Order Tracker
    - Excel Inventory Tracker Spreadsheet Google Sheets Small Business Materials & Product Log Inventory Management Template Profit Sales Tracker
    - Inventory Tracker Spreadsheet for Small Business Inventory Template Google Sheets Excel Inventory Management Log Inventory Order Tracker
    - Google Sheets Inventory Tracker Spreadsheet | Product Management Tool | Inventory Management | Business Spreadsheet | Reseller Template
  domain_constraints:
    - one_time_purchase_digital_download
    - spreadsheet_only_delivery
    - no_login_or_subscription_claims
    - no_saas_or_multi_user_claims
  risk_of_false_scope:
    - The market evidence supports a workbook product, not a service, app, or subscription.
