  description: |
    Inventory Tracker Studio is a direct-download spreadsheet workbook for small businesses, makers, and resellers who need a practical replenishment decision surface.

    The workbook answers what to reorder, when to reorder it, and how much to buy. It uses Setup defaults, Inventory stock, purchase rows, and sales rows to calculate reorder action, reorder-by date, projected stockout date, days of cover, suggested order quantity, sales velocity, lead time used, and safety stock for every SKU.

    It ships with Start Here, Dashboard, Setup, Inventory, Purchases, Sales, Price Calculator, Price List, and Help. Yellow cells are for buyer input. Formula cells and decision outputs update automatically. Capacity is 100 inventory rows, 300 purchase rows, 500 sales rows, 100 calculator rows, and 100 price-list rows.

    It is a spreadsheet workbook, not a subscription app, not a live inventory service, not bank-connected, and not bookkeeping or tax advice.
