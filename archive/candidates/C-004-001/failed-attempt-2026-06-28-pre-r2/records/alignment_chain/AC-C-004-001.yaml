    - The downloaded workbook delivers an inventory dashboard and a pricing log, but the pricing calculator has a broken internal dependency that must be repaired.
  alignment_notes:
    - Keep inventory, pricing, and price-list outputs visible in the product narrative.
    - Do not promise a complete pricing calculator until the missing RECIPE dependency is repaired.
    - Use the inventory dashboard as the main proof surface because it is currently the most coherent part of the workbook.
