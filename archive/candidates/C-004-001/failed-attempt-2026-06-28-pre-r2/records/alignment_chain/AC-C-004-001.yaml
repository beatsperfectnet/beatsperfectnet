  primary_buyer_job: Track stock, product cost, and resale price in one workbook without juggling separate inventory and pricing tools.
  primary_kpp: See what is in stock and what it should sell for while keeping inventory value and price outputs visible.
  one_rtb_system: The workbook's INVENTORY sheet updates stock status and value, the PRICE CALCULATOR computes product cost and selling price, and the PRICE LIST records the computed snapshot, but the price calculator currently depends on a missing RECIPE sheet and broken workbook names.
  one_hook_hypothesis: A compact workbook that combines inventory status, pricing math, and a price log will appeal to small sellers who need one spreadsheet instead of separate stock and pricing tools.
  excluded_scope:
