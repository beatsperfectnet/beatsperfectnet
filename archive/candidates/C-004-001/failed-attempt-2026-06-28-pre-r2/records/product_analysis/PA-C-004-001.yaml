  observed_tabs_components:
    - value: inventory dashboard
      evidence_summary: Core proof surface in the stronger listings.
    - value: products
      evidence_summary: Product-level tracking is visible in the category.
    - value: materials or BOM
      evidence_summary: Premium listings add materials and bill-of-materials support.
    - value: suppliers
      evidence_summary: Supplier tracking appears in the richer multi-tab inventory systems.
    - value: purchases
      evidence_summary: Purchase tracking helps buyers keep stock updated.
    - value: sales
      evidence_summary: Sales tracking connects stock to demand.
    - value: setup or read me
      evidence_summary: Setup and first-use guidance are common buyer trust surfaces.
  observed_workflows:
    - value: track stock on hand and reorder before items run out
      evidence_summary: This is the primary buyer job surfaced by the listings.
    - value: connect purchases and sales to inventory counts
      evidence_summary: The strongest listings make inventory update paths explicit.
    - value: manage suppliers and compare product costs
      evidence_summary: Supplier and price tracking reduce manual work for small businesses and resellers.
    - value: understand product profit and profit margin
      evidence_summary: Several listings frame inventory as a business decision tool, not only a count sheet.
  observed_formulas_features:
    - value: on-hand quantity updates
      evidence_summary: Inventory math updates stock automatically in the stronger listings.
    - value: reorder thresholds
      evidence_summary: Low-stock behavior is a visible category utility.
    - value: profit and margin calculations
      evidence_summary: Profit math is explicitly called out in the premium benchmarks.
    - value: supplier and purchase rollups
      evidence_summary: Richer listings connect purchases and suppliers to stock status.
  observed_dashboards:
    - value: dashboard with stock summaries, sales, and profit cards
      evidence_summary: Dashboard-style presentation is common in the better inventory listings.
  observed_visual_surface_patterns:
    - value: dashboard-first spreadsheet preview, strong compatibility cues, and explicit inventory management framing
      evidence_summary: The market prefers immediate utility proof over decorative visuals.
  observed_buyer_decision_bearing_charts:
    - value: inventory cost versus inventory value
      evidence_summary: Helps buyers judge whether the stock picture makes sense.
    - value: sales versus available stock
      evidence_summary: Helps buyers see whether stock is being consumed or replenished.
    - value: profit versus margin
      evidence_summary: Helps buyers understand whether inventory activity is actually healthy.
  observed_chart_unit_and_threshold_semantics:
    - value: inventory charts must label counts, costs, and profit clearly
      evidence_summary: Charts only help if the unit and meaning are obvious.
  observed_sample_data_examples:
    - value: starter products, materials, suppliers, and orders
      evidence_summary: Sample data makes the workbook understandable before editing.
  recurring_actionable_complaints:
    - complaint: setup can be confusing if the inventory workbook is too bare
      complaint_frequency: recurring in spreadsheet-template category
      evidence: Clear onboarding and setup surfaces reduce first-open uncertainty.
    - complaint: stock math feels fragile when the update path is unclear
      complaint_frequency: recurring in inventory category
      evidence: Buyers need obvious purchase, sales, and manufacturing updates.
    - complaint: buyers want a business view, not only a product count table
      complaint_frequency: recurring
      evidence: The strongest listings add dashboard, profit, and supplier views.
  complaint_frequency: setup_confusion_and_weak_inventory_update_paths_are_recurring_category_risks
  complaint_evidence:
    - Benchmark listings visibly show dashboards, setup guidance, and category-specific inventory surfaces to pre-answer objections.
  scope_gap_summary: The gap is not more features; it is a finished inventory-management workbook with screenshot-worthy internal surfaces that make stock, purchases, sales, suppliers, and profit visible.
  product_scope_recommendations:
    - value: Build an inventory dashboard, products table, materials or BOM surface, suppliers sheet, purchases sheet, sales sheet, and setup guidance.
      evidence_summary: These surfaces are repeatedly visible in market examples and support the listing promise.
  forbidden_feature_inference:
    - value: SaaS automation, login requirements, subscription billing, multi-user permissions
      evidence_summary: Not required by the observed spreadsheet promise and would create unsupported claims.
