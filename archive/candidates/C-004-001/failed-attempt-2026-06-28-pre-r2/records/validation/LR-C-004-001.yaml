  passed_system: true
  passed_buyer_experience_checks:
    access_path_clear: true
    first_open_clear: true
    first_action_clear: true
    editable_areas_obvious: true
    reset_or_recovery_available: true
    unsupported_actions_stated: true
    replenishment_decision_outputs_visible: true
  passed_product_visual_quality:
    brandbook_compliance: true
    real_surface_screenshot_readiness: true
    chart_readability: true
    listing_text_clipping_absent: true
  passed_listing_gate: true
  supported_platforms:
    - Excel-compatible spreadsheet editors
    - Google Sheets standard-formula import
  stated_limits:
    - The workbook does not connect to banks, live inventory services, shipping systems, or marketplaces.
    - Reorder quantities are planning estimates from buyer-entered stock, purchase, sales, lead time, and buffer data.
    - Google Sheets import protection behavior can vary by editor or account.
    - It is a direct-download workbook, not a service.
    - It is not tax, accounting, or financial advice.
  unsupported_actions:
    - live bank sync
    - live stock sync
    - live marketplace automation
    - barcode scanning
    - tax preparation
    - custom bookkeeping services
    - guaranteed imported protection settings in Google Sheets
  editable_areas:
    - Setup inputs for review date, sales lookback, fees, target margin, default reorder point, lead time, safety stock, pack size, and support note
    - Inventory opening stock, reorder point, unit cost, and notes
    - Purchase log rows
    - Sales log rows
    - Price Calculator input rows
    - Price List snapshot rows
  protected_or_generated_areas:
    - Dashboard formulas and charts
    - Inventory purchase roll-up, sales roll-up, on-hand, inventory value, sales velocity, days cover, projected stockout, lead time, safety stock, order quantity, reorder-by date, action, and status outputs
    - Purchase totals
    - Sales revenue, COGS, and gross profit outputs
    - Price Calculator outputs
    - Price List snapshot outputs
  recovery_method:
    - Duplicate the workbook before heavy edits.
    - If formulas are damaged, restore from a clean copy.
  originality_check: pass
  private_asset_exclusion_check: pass
