  <g font-family="Inter, Arial, sans-serif"><rect x="120" y="300" width="780" height="340" rx="18" fill="#FFFFFF" stroke="#D9E2EC" stroke-width="3"/><text x="154" y="358" font-size="36" font-weight="700" fill="#1F6F8B">Grocery columns</text><text x="154" y="415" font-size="28" fill="#102A43">Category</text><text x="154" y="461" font-size="28" fill="#102A43">Item</text><text x="154" y="507" font-size="28" fill="#102A43">Needed qty</text><text x="154" y="553" font-size="28" fill="#102A43">Pantry on hand</text><rect x="1000" y="300" width="780" height="340" rx="18" fill="#FFFFFF" stroke="#D9E2EC" stroke-width="3"/><text x="1034" y="358" font-size="36" font-weight="700" fill="#1F6F8B">Shopping decision</text><text x="1034" y="415" font-size="28" fill="#102A43">Buy qty</text><text x="1034" y="461" font-size="28" fill="#102A43">Estimated cost</text><text x="1034" y="507" font-size="28" fill="#102A43">Checked status</text><rect x="120" y="720" width="780" height="340" rx="18" fill="#FFFFFF" stroke="#D9E2EC" stroke-width="3"/><text x="154" y="778" font-size="36" font-weight="700" fill="#1F6F8B">Pantry tracker</text><text x="154" y="835" font-size="28" fill="#102A43">On hand qty</text><text x="154" y="881" font-size="28" fill="#102A43">Reorder threshold</text><text x="154" y="927" font-size="28" fill="#102A43">Need soon flag</text><rect x="1000" y="720" width="780" height="340" rx="18" fill="#FFFFFF" stroke="#D9E2EC" stroke-width="3"/><text x="1034" y="778" font-size="36" font-weight="700" fill="#1F6F8B">Support risk closed</text><text x="1034" y="835" font-size="28" fill="#102A43">No external-data formulas</text><text x="1034" y="881" font-size="28" fill="#102A43">No Google Form delivery funnel</text></g>
