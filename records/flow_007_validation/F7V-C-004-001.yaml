flow_007_validation:
  validation_id: F7V-C-004-001
  candidate_id: C-004-001
  validation_type: dry_validation_from_flow_006_postmortem
  flow_version: FLOW-007
  validated_at: 2026-06-29
  input_evidence:
    - records/failure-cases/C-004-001-FLOW-006-postmortem.md
    - records/purchased_competitor_inspection/PCI-C-004-001.yaml
    - records/propagation_system_spec/PSS-C-004-001-R2.yaml
    - records/validation/QA-C-004-001-R2.yaml
    - records/validation/FA-C-004-001-R2.yaml
    - records/validation/PM-C-004-001-R2.yaml
    - records/validation/LR-C-004-001-R2.yaml
  artifact_rebuild_performed: false
  build_readiness:
    status: NOT_BUILD_READY
    hard_rule_applied: Only candidates with build_readiness.status = BUILD_READY may enter product generation.
  expected_blockers:
    - product identity reframe would fail because the candidate stays in the inventory tracker class
    - competitor benchmark insufficient or shallow
    - target audience not locked before build
    - buyer behavior contract insufficient
    - domain model failed because Opening Stock was treated as static
    - decision outputs not fully locked
    - scenario matrix would fail supplier/lead-time/receipt/stock-count-change cases
    - workbook blueprint would require invention of sheet structure and columns
    - builder input completeness would fail because the builder would have to invent core inputs
    - pre-build architecture premortem would identify the same failed product path
  contract_section_results:
    product_identity_reframe:
      status: PRODUCT_IDENTITY_FAILED
      blocker: Candidate remains the generic inventory tracker class instead of a distinct buyer-decision product.
    market_evidence:
      status: PASS
      note: Market signal was real but insufficient for build readiness.
    competitor_autopsy:
      status: BENCHMARK_INSUFFICIENT
      blocker: Competitor/category standard was too shallow to lock architecture.
    target_audience_contract:
      status: TARGET_CONTRACT_FAILED
      blocker: Primary buyer, data maturity segments, and excluded buyers were not locked before build.
    buyer_behavior_contract:
      status: NOT_BUILD_READY
      blocker: Repeated usage loop and decision behavior were under-specified before generation.
    domain_model_contract:
      status: DOMAIN_MODEL_FAILED
      blocker: Opening Stock was treated as a static SKU field instead of dated stock state/events.
    decision_output_contract:
      status: DECISION_OUTPUT_FAILED
      blocker: Reorder timing, quantity, confidence, and next action were not fully locked against the domain model.
    scenario_matrix:
      status: SCENARIO_MATRIX_FAILED
      failed_canonical_scenarios:
        - supplier change
        - lead time change
        - stock count correction
        - purchase received
        - no sales history
        - less than 30 days of sales
    workbook_or_product_blueprint:
      status: PRODUCT_BLUEPRINT_FAILED
      blocker: The builder would have to invent workbook structure, required sheets, required columns, and demo fixtures.
    builder_input_completeness:
      status: BUILDER_INPUT_INCOMPLETE
      blocker: Builder inputs are incomplete because the product identity and workbook blueprint are not locked.
    pre_build_architecture_premortem:
      status: PRE_BUILD_ARCHITECTURE_PREMORTEM_FAILED
      blocker: The same failed inventory snapshot path remains available without a stronger blueprint or fixture lock.
  result:
    status: NOT_BUILD_READY
    launch_status_allowed: false
    product_generation_allowed: false
    blocked_by:
      - PRODUCT_IDENTITY_FAILED
      - PRODUCT_BLUEPRINT_FAILED
      - BUILDER_INPUT_INCOMPLETE
      - PRE_BUILD_ARCHITECTURE_PREMORTEM_FAILED
      - SAME_FAILED_PRODUCT_CLASS_BLOCKED
    summary: C-004-001 fails FLOW-007 dry validation and is blocked before build; it must return to Product Identity Reframe and Product Architecture Contract instead of artifact rebuild.
