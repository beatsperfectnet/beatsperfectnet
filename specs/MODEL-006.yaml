MODEL-006:
  purpose: governed_model_routing_for_flow_006
  model_catalog:
    mini:
      runtime_model_id: openai/gpt-5.4-mini
      purpose:
        - candidate_admission
        - delivery_assembly
        - post_launch_ledgers_and_rules
      normal_flow_allowed: true
    medium:
      runtime_model_id: openai/gpt-5.4
      purpose:
        - public_shelf_read_synthesis
        - competitor_selection
        - purchased_competitor_inspection
        - first_pass_connected_build
        - qa_execution
        - optional_supporting_feature_pass
        - listing_title_description_and_claim_map_assembly
        - listing_repair
      normal_flow_allowed: true
    deterministic:
      runtime_model_id: deterministic
      purpose:
        - artifact_integrity_audit
        - formula_truth_table_validation
        - period_continuity_validation
        - protection_truthfulness_validation
        - prepublish_validation
      normal_flow_allowed: true
    frontier:
      runtime_model_id: openai/gpt-5.5
      purpose:
        - alignment_synthesis
        - one_promise_propagation_system_spec
        - founder_acceptance_simulation
        - listing_quality_gate
        - pre_mortem_failure_analysis
      normal_flow_allowed: true
    human:
      runtime_model_id: human
      purpose:
        - purchase_approval_and_acquisition
      normal_flow_allowed: true
  stage_routing:
    candidate_admission:
      governed_model_tier: mini
      requested_model: gpt-5.4-mini
    public_shelf_read_synthesis:
      governed_model_tier: medium
      requested_model: gpt-5.4
    competitor_selection:
      governed_model_tier: medium
      requested_model: gpt-5.4
    purchase_approval_and_acquisition:
      governed_model_tier: human
      requested_model: human
    purchased_competitor_inspection:
      governed_model_tier: medium
      requested_model: gpt-5.4
    alignment_synthesis:
      governed_model_tier: frontier
      requested_model: gpt-5.5
    one_promise_propagation_system_spec:
      governed_model_tier: frontier
      requested_model: gpt-5.5
    first_pass_connected_build:
      governed_model_tier: medium
      requested_model: gpt-5.4
    qa_execution:
      governed_model_tier: medium
      requested_model: gpt-5.4
    artifact_integrity_audit:
      governed_model_tier: deterministic
      requested_model: deterministic
    formula_truth_table_validation:
      governed_model_tier: deterministic
      requested_model: deterministic
    period_continuity_validation:
      governed_model_tier: deterministic
      requested_model: deterministic
    protection_truthfulness_validation:
      governed_model_tier: deterministic
      requested_model: deterministic
    optional_supporting_feature_pass:
      governed_model_tier: medium
      requested_model: gpt-5.4
    founder_acceptance_simulation:
      governed_model_tier: frontier
      requested_model: gpt-5.5
    listing_title_description_and_claim_map_assembly:
      governed_model_tier: medium
      requested_model: gpt-5.4
    listing_visual_composition:
      governed_model_tier: medium
      requested_model: gpt-5.4
    listing_quality_gate:
      governed_model_tier: frontier
      requested_model: gpt-5.5
    pre_mortem_failure_analysis:
      governed_model_tier: frontier
      requested_model: gpt-5.5
    listing_repair:
      governed_model_tier: medium
      requested_model: gpt-5.4
    delivery_assembly:
      governed_model_tier: mini
      requested_model: gpt-5.4-mini
    prepublish_validation:
      governed_model_tier: deterministic
      requested_model: deterministic
    publishing_and_version_recording:
      governed_model_tier: mini
      requested_model: gpt-5.4-mini
    post_launch_ledgers_and_rules:
      governed_model_tier: mini
      requested_model: gpt-5.4-mini
  exact_requested_vs_actual_validation: true
  runtime_launcher_ref: runtime/model-stage-launcher.mjs
  stage_quality_rules:
    candidate_admission:
      rule: market_demand_must_use_ready_market_research_tool_or_explicit_human_override
      forbidden_substitutes:
        - historical_memory_only
        - generic_web_search_without_required_market_metrics
        - invented_new_entrant_counts
      escalate_if:
        - market_research_tool_unavailable
        - required_market_metrics_missing
        - demand_threshold_source_unclear
    public_evidence_extraction:
      rule: public_shelf_read_must_record_evidence_quality_and_missing_visual_or_market_inputs
      required_decision: pass_escalate_or_blocked
      escalate_if:
        - listing_gallery_or_thumbnail_evidence_missing
        - revenue_reviews_age_or_seller_signals_unknown_for_key_candidates
        - evidence_sources_do_not_support_jtbd_kpp_hook_rtb_claims
    competitor_selection:
      rule: select_benchmark_by_representativeness_and_market_strength_before_price_or_purchase_friction
      tie_breaker_order:
        - match_tier
        - market_strength
        - product_surface_completeness
        - gallery_visual_evidence
        - price_and_purchase_friction
      forbidden_primary_tie_breakers:
        - lowest_price_only
        - visible_price_only
        - easiest_live_search_result
      escalate_if:
        - seller_revenue_reviews_age_or_visual_evidence_unknown_for_selected_competitor
        - stronger_feature_surface_alternative_is_rejected_only_for_price_visibility
        - selected_product_could_distort_candidate_scope
    purchased_competitor_inspection:
      rule: broken_competitor_parts_are_evidence_and_build_requirements_not_our_publish_blockers
      required_classifications:
        - market_evidence
        - build_requirement
        - competitor_failure_not_our_blocker
        - benchmark_insufficient
      escalate_if:
        - purchased_artifact_is_broken_enough_to_be_unrepresentative
        - purchased_artifact_lacks_core_surfaces_needed_for_benchmarking
        - additional_purchase_may_be_needed
      hard_block_if:
        - benchmark_adequacy_is_not_pass_and_additional_purchase_or_equivalent_benchmark_evidence_is_unresolved
      required_outputs:
        - domain_standard_decision_outputs
        - benchmark_adequacy
        - additional_purchase_escalation
    one_promise_propagation_system_spec:
      rule: define_real_buyer_behavior_loop_working_capacity_and_machine_checkable_jtbd_kpp_rtb_product_contract_before_build
      spreadsheet_required_outputs:
        - buyer_behavior_contract
        - machine_checkable_product_contract
        - primary_buyer_decision_contract
        - buyer_behavior_to_input_transformation_output_map
        - input_to_decision_map
        - next_action_map
        - domain_invariants
        - domain_standard_requirements
        - forbidden_shallow_substitutes
        - working_capacity_requirements
        - human_scale_capacity_floor
        - prior_artifact_baseline
        - material_delta_requirements
        - row_expansion_requirements
        - formula_range_acceptance_requirements
        - jtbd_truth_table_tests
        - adversarial_buyer_scenarios
        - demo_vs_working_capacity_policy
        - setup_input_propagation_requirements
        - competitor_failure_handling
        - benchmark_adequacy_resolution
      fail_if:
        - jtbd_is_defined_as_output_feature_scope_product_category_or_status_without_buyer_behavior_loop
        - kpp_is_a_feature_scope_list_or_status_snapshot_instead_of_buyer_decision_promise
        - primary_buyer_decision_outputs_are_missing_or_not_machine_checkable
        - decision_outputs_do_not_map_to_understandable_next_actions
        - domain_invariant_violation_can_be_labeled_healthy_successful_or_no_action_without_review
        - adversarial_scenarios_do_not_cover_real_buyer_failure_states
        - setup_inputs_do_not_have_declared_downstream_use_or_are_not_labeled_as_defaults
        - competitor_benchmark_is_broken_or_insufficient_without_resolved_additional_evidence
    first_pass_connected_build:
      rule: build_a_behavior_complete_working_product_not_a_tiny_demo_or_formula_presence_artifact
      spreadsheet_required_outputs:
        - buyer_behavior_contract_ref
        - machine_checkable_product_contract_ref
        - primary_buyer_decision_outputs
        - buyer_behavior_to_next_action_manifest
        - adversarial_scenario_coverage_manifest
        - jtbd_output_manifest
        - setup_input_usage_manifest
        - working_capacity_manifest
        - visible_capacity_manifest
        - artifact_delta_against_prior
        - human_scale_capacity_evidence
        - formula_ranges_covering_working_capacity
        - editable_ranges_covering_working_capacity
      fail_if:
        - artifact_does_not_implement_the_required_buyer_behavior_loop
        - inputs_exist_without_a_buyer_behavior_reason
        - outputs_do_not_tell_the_buyer_what_next_action_to_take
        - visible_buyer_rows_tables_or_expansion_path_match_prior_failed_artifact
        - capacity_exists_only_in_hidden_formula_ranges
        - regenerated_timestamps_are_the_only_material_change
        - artifact_does_not_implement_required_primary_buyer_decision_outputs
        - all_working_capacity_rows_are_prepopulated_as_demo_data_without_blank_formula_ready_capacity
        - buyer_visible_setup_input_has_no_downstream_formula_or_declared_prefill_role
    qa_execution:
      rule: qa_must_execute_buyer_behavior_and_adversarial_mutations_not_only_inspect_formula_presence
      required_results:
        - buyer_behavior_contract_results
        - buyer_behavior_walkthrough_results
        - executable_adversarial_scenario_results
        - machine_checkable_product_contract_results
        - jtbd_truth_table_results
        - primary_buyer_decision_output_results
        - setup_input_propagation_results
        - working_capacity_results
        - visible_capacity_results
        - prior_artifact_delta_results
        - artifact_delta_gate
        - row_expansion_or_capacity_boundary_mutations
      fail_if:
        - qa_does_not_start_from_visible_buyer_instructions_and_complete_the_behavior_loop_to_next_action
        - mutation_tests_only_inspect_formula_references_without_recalculated_before_after_outputs
        - adversarial_scenarios_are_missing_for_domain_failure_states
        - impossible_or_unsafe_domain_states_are_presented_as_healthy_successful_or_no_action_without_review
        - core_table_visible_capacity_matches_prior_failed_version
        - qa_record_passes_without_direct_workbook_capacity_counts
        - required_decision_output_is_missing_from_artifact
        - kpp_passes_only_because_a_feature_status_label_or_dashboard_count_exists
        - setup_input_does_not_change_downstream_output_or_have_declared_default_role
    founder_acceptance_simulation:
      rule: adversarially_simulate_founder_review_and_fail_any_product_that_still_needs_founder_feedback
      corpus_ref: specs/FOUNDER-ACCEPTANCE-CORPUS-001.yaml
      required_review_lanes:
        - real_human_use_pressure
        - blind_buyer_behavior_walkthrough
        - product_logic_review
        - adversarial_buyer_scenario_review
        - in_product_human_wording_review
        - listing_delivery_readiness_review
        - cost_outcome_accountability_review
      required_outputs:
        - founder_acceptance_status
        - buyer_behavior_contract_ref
        - machine_checkable_product_contract_ref
        - blind_buyer_behavior_walkthrough
        - adversarial_buyer_scenario_review
        - jtbd_decision_output_review
        - missing_decision_outputs
        - direct_artifact_inspection_evidence
        - artifact_delta_review
        - listing_hook_review
        - cost_outcome_accountability
        - adversarial_rejection_attempts
        - corpus_pattern_results
        - rejection_reasons
        - required_repair_scope
        - rerun_from_step
        - human_override
      pass_rule: pass_only_when_no_blocking_rejection_patterns_remain_or_explicit_human_override_is_recorded
      fail_if:
        - jtbd_is_defined_as_output_or_feature_scope_without_buyer_behavior_loop
        - blind_buyer_walkthrough_cannot_reach_a_correct_next_action_without_founder_explanation
        - adversarial_buyer_scenarios_are_missing_or_not_mutated_in_the_artifact
        - domain_invariant_violation_is_labeled_healthy_successful_or_no_action_without_review
        - formulas_or_logic_only_work_for_seed_demo_rows
        - product_visible_capacity_matches_prior_failed_demo_version
        - artifact_delta_is_only_timestamps_records_or_claims
        - product_copy_sounds_like_developer_or_agent_language
        - primary_jtbd_decision_outputs_are_missing_or_only_in_prose
        - kpp_is_reduced_to_status_snapshot_feature_list_or_visual_dashboard
        - buyer_workflow_requires_founder_explanation
        - listing_hook_criteria_would_allow_clean_layout_without_real_hook
        - material_run_cost_produced_same_founder_rejected_outcome
        - delivery_or_listing_assets_still_need_founder_feedback_to_be_buyable
    listing_title_description_and_claim_map_assembly:
      rule: hook_is_visual_shelf_stopping_composition_plus_copy_not_copy_alone
      required_outputs:
        - visual_hook_strategy
        - per_image_visual_hook_strategy
        - per_image_promise_rtb_alignment
        - grid_stop_reason_per_image
        - hook_delta_against_prior
      forbidden_outputs:
        - report_slide_layout_as_thumbnail
        - tiny_product_surface_that_cannot_prove_claim
        - unaligned_feature_list_copy
        - repeated_clean_template_without_distinct_image_hooks
        - screenshot_presence_as_the_only_hook
    listing_quality_gate:
      rule: fail_assets_that_would_lose_in_a_real_marketplace_grid
      required_checks:
        - visual_hook_strength
        - real_hook_quality_gate
        - grid_stop_reason_per_image
        - hook_delta_against_prior
        - no_text_overlap_or_clipping
        - product_surface_readable_enough_to_prove_claim
        - each_image_has_one_promise_and_matching_reason_to_believe
      fail_if:
        - clean_assets_lack_real_hook
        - every_image_uses_same_visual_hierarchy_without_distinct_grid_stop_reason
    pre_mortem_failure_analysis:
      rule: assume_launch_failed_and_find_specific_preventable_offer_failures_using_only_current_evidence
      required_inputs:
        - delivered_product_assets
        - listing_images_title_description
        - delivery_readme_onboarding
        - founder_acceptance_result
        - qa_result
        - public_shelf_evidence
        - purchased_competitor_inspection
        - company_memory
      required_outputs:
        - top_3_likely_failure_modes
        - evidence_for_each_failure_mode
        - failure_mode_category
        - launch_blocker_or_watchlist
        - rerun_from_step_for_each_blocker
        - post_launch_signal_for_each_watchlist
        - scope_bloat_check
      allowed_categories:
        - product
        - listing
        - delivery
        - market_fit
        - promise
        - pricing
        - trust
      pass_rule: pass_when_no_specific_preventable_launch_blockers_remain_or_only_watchlist_risks_remain
      fail_if:
        - failure_mode_uses_imagined_customer_or_feature_scope_without_current_evidence
        - blocker_lacks_specific_preventable_cause
        - blocker_lacks_earliest_relevant_rerun_step
        - watchlist_lacks_post_launch_signal_to_monitor
        - proposed_feature_is_not_proven_by_locked_buyer_behavior_jtbd_or_marketplace_evidence
        - analysis_reopens_product_scope_from_speculation
        - top_3_failure_modes_are_generic_or_unsupported_by_product_listing_delivery_or_market_evidence
