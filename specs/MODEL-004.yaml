      - bestseller_listing_promise
      - bestseller_buyer_expectations
      - evidence_refs_for_jtbd_and_promise
      - listing_evidence_packet
      - bestseller_visual_grammar
      - benchmark_screenshot_expectations

  product_analysis:
    governed_model_tier: medium
    default_model: gpt-5.4
    escalation_model: gpt-5.5
    reasoning_effort: medium
    text_verbosity: low
    processing_mode: standard
    quality_critical: true
    default_max_output_tokens: 16000
