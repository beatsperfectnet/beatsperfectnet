MODEL-004:
  purpose: deterministic_model_routing_for_bootstrap_execution_with_competitor_purchase_and_inspection
  pricing_snapshot_ref: specs/PRICING-004.yaml
  generation_budget_contract_ref: governance/08_product_generation_budget_004.yaml

  model_catalog:
    mini:
      provider: openai
      model_id: gpt-5.4-mini
      runtime_model_id: openai/gpt-5.4-mini
      reasoning_effort: none
      text_verbosity: low
      purpose:
        - deterministic_extraction
        - rule_application
        - state_updates
        - record_creation
        - mechanical_publishing
        - post_launch_ledger_work
      normal_flow_allowed: true
    medium:
      provider: openai
      model_id: gpt-5.4
      runtime_model_id: openai/gpt-5.4
      reasoning_effort: low_to_medium
      text_verbosity: low
      purpose:
        - bounded_market_analysis
        - candidate_domain_analysis
        - competitor_selection
        - verification
        - localized_corrections
      normal_flow_allowed: true
    frontier:
      provider: openai
      model_id: gpt-5.5
      runtime_model_id: openai/gpt-5.5
      reasoning_effort: medium
      text_verbosity: low
      purpose:
        - purchased_product_forensic_inspection
        - final_specification_synthesis
        - core_product_implementation
        - buyer_facing_listing_asset_creation
        - adversarial_qa
        - launch_readiness_review
      normal_flow_allowed: true
    gpt-5.5-pro:
      provider: openai
      model_id: gpt-5.5-pro
      runtime_model_id: openai/gpt-5.5-pro
      reasoning_effort: high
      text_verbosity: low
      purpose:
        - explicit_human_approved_exception_only
      normal_flow_allowed: false
      disabled_for_normal_flow: true
      approval_required: explicit_human_approval

  research:
    governed_model_tier: mini
    default_model: gpt-5.4-mini
    fallback_model: gpt-5.4
    escalation_model: gpt-5.5
    reasoning_effort: low
    text_verbosity: low
    processing_mode: standard
    quality_critical: false
    default_max_output_tokens: 8000
    purpose: early_market_research_and_structural_screening
    rule: research_must_collect_only_observable_marketplace_evidence
    output_must_include:
      - ideas
      - observed_new_entrants_above_threshold

  listing_analysis:
    governed_model_tier: medium
    default_model: gpt-5.4
    escalation_model: gpt-5.5
    reasoning_effort: low
    text_verbosity: low
    processing_mode: standard
    quality_critical: true
    default_max_output_tokens: 16000
    purpose: create_listing_evidence_packet_from_observable_benchmark_bestseller_evidence
    rule: listing_analysis_must_only_collect_observable_marketplace_evidence_and_must_not_infer_intent_hierarchy_conversion_strategy_or_product_scope
    output_must_include:
