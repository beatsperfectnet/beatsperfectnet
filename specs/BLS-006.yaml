BLS-006:
  purpose: build_lifecycle_specification
  candidate_stages:
    - candidate_admission
    - public_shelf_read
    - mandatory_competitor_purchase
    - hidden_buyer_experience_inspection
    - alignment_synthesis
    - one_promise_propagation_system_spec
    - first_pass_connected_build
    - propagation_buyer_experience_product_visual_qa
    - founder_acceptance_simulation
    - optional_supporting_feature_pass
    - listing_creative_assembly
    - listing_quality_gate
    - delivery_launch
    - monthly_outcomes
    - competitor_purchase_accounting
    - kill_rules
    - resource_allocation_rules
    - company_metrics
  pre_launch_tracking:
    - current_stage
    - stage_iteration
    - cumulative_prompt_tokens
    - cumulative_completion_tokens
    - cumulative_total_tokens
    - cumulative_api_cost_usd
    - market_research_tool_status
    - market_demand_evidence_quality
    - public_shelf_read_ref
    - public_evidence_quality_gate
    - competitive_purchase_approval_ref
    - purchase_status
    - purchased_competitor_inspection_ref
    - inspection_status
    - benchmark_adequacy
    - additional_purchase_escalation_ref
    - alignment_chain_ref
    - propagation_system_spec_ref
    - prior_artifact_baseline_ref
    - material_artifact_delta_status
    - visible_capacity_gate_status
    - qa_result
    - founder_acceptance_ref
    - founder_acceptance_status
    - founder_rejection_patterns
    - listing_hook_ref
    - listing_creative_assembly_ref
    - visual_hook_quality_gate
    - per_image_real_hook_gate
    - cost_outcome_accountability_status
    - listing_quality_gate_ref
    - launch_package_ref
  stage_loop_limits:
    building_medium_qa_loops: 1
    fixing_medium_qa_loops: 1
    frontier_qa_loops: 1
  launch_requires:
    - candidate_admission_passed
    - market_research_tool_ready_or_human_override_recorded
    - market_demand_evidence_quality_passed
    - public_evidence_quality_passed_or_escalation_resolved
    - purchase_completed
    - hidden_inspection_completed
    - benchmark_adequacy_passed_or_additional_purchase_escalation_resolved
    - alignment_chain_complete
    - propagation_system_spec_complete
    - first_pass_connected_build_complete
    - artifact_integrity_audit_passed
    - formula_truth_table_passed_or_not_applicable_with_reason
    - working_capacity_passed_or_not_applicable_with_reason
    - visible_human_scale_capacity_passed
    - material_artifact_delta_passed
    - period_continuity_passed_or_not_applicable_with_reason
    - protection_truthfulness_passed
    - qa_passed
    - founder_acceptance_passed_or_explicit_human_override_recorded
    - listing_creatives_completed
    - visual_hook_quality_passed
    - per_image_real_hook_passed
    - cost_outcome_accountability_passed
    - listing_quality_passed
    - publish_blockers_absent
    - delivery_launch_ready
